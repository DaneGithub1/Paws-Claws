<!doctype html>
<html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Paws &amp; Claws</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#fff2df;color:white;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh}.hud{position:fixed;z-index:3;left:0;right:0;top:0;padding:10px;display:flex;gap:8px;justify-content:space-between;pointer-events:none}.pill{border:2px solid rgba(255,220,150,.40);background:rgba(80,40,10,.82);box-shadow:0 4px 14px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.15);border-radius:22px;padding:7px 13px;font-weight:900;font-size:13px;text-shadow:0 2px 4px #000;backdrop-filter:blur(6px);white-space:nowrap}.bar{position:fixed;z-index:3;left:18px;right:18px;top:54px;height:10px;border-radius:99px;border:2px solid rgba(255,255,255,.20);background:rgba(0,0,0,.28);overflow:hidden}.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#ff6fa0,#ffda4e,#6fff6a);border-radius:99px;transition:width .15s}.overlay{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;padding:16px;background:radial-gradient(circle at 50% 6%,rgba(255,200,100,.55),rgba(90,44,14,.94) 55%,rgba(35,18,10,.97));text-align:center}.card{width:min(440px,100%);max-height:94vh;overflow-y:auto;overflow-x:hidden;border-radius:30px;padding:20px 18px;background:linear-gradient(180deg,rgba(255,238,208,.97) 0%,rgba(255,218,168,.97) 55%,rgba(200,140,80,.97) 100%);border:2px solid rgba(255,255,255,.22);box-shadow:0 32px 80px rgba(0,0,0,.70),inset 0 1px 0 rgba(255,255,255,.15)}h1{margin:2px 0 6px;font-size:28px;letter-spacing:-.5px;color:#4a1e08;text-shadow:0 2px 0 #ffd890,0 4px 8px rgba(70,24,0,.3)}h2{margin:12px 0 6px;font-size:17px;color:#5a2810}.muted{color:#6a3820;line-height:1.4;font-weight:700;font-size:14px}.logo{font-size:40px;margin-bottom:2px}.btn{border:0;border-radius:18px;background:linear-gradient(180deg,#87ff9d,#18c95d);color:#06150a;font-weight:900;font-size:17px;padding:13px 18px;margin:7px 4px;box-shadow:0 7px 0 #0d7f3c,0 14px 22px rgba(0,0,0,.30);touch-action:manipulation;cursor:pointer;display:inline-block}.btn:active{transform:translateY(5px);box-shadow:0 2px 0 #0d7f3c}.btn.blue{background:linear-gradient(180deg,#88d8ff,#318cff);box-shadow:0 7px 0 #125397;color:white}.btn.gold{background:linear-gradient(180deg,#ffe56a,#f29b15);box-shadow:0 7px 0 #8d530c;color:#211306}.btn.dim{background:linear-gradient(180deg,#57606d,#252b37);box-shadow:0 7px 0 #111722;color:#c9d2de}.tabs{display:flex;gap:6px;margin:10px 0}.tabs button{flex:1;font-size:12px;padding:9px 4px}.chapter{border-radius:20px;padding:14px;margin:10px 0;background:linear-gradient(135deg,rgba(255,188,102,.55),rgba(255,240,190,.40));border:2px solid rgba(140,80,20,.25);text-align:left;color:#4a1e08}.chapter b{font-size:18px}.lvlrow{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:10px}.lvl{height:54px;border-radius:15px;border:0;font-weight:900;background:linear-gradient(180deg,#ffe05d,#ef9714);box-shadow:0 5px 0 #95530b;color:#2c1800;cursor:pointer}.lvl.lock{background:linear-gradient(180deg,#555969,#252936);box-shadow:0 5px 0 #11141c;color:#929aa8}.lvl.done{background:linear-gradient(180deg,#8cff88,#28bf54);box-shadow:0 5px 0 #0c7431;color:#071b0a}.upgrade{display:grid;grid-template-columns:1fr 1fr;gap:8px}.up{border-radius:16px;padding:10px;background:rgba(255,248,225,.88);border:2px solid rgba(180,110,30,.25);font-weight:900;color:#4a1e08;cursor:pointer;text-align:left}.choose{display:grid;grid-template-columns:1fr;gap:8px}.choice{padding:12px;border-radius:18px;background:linear-gradient(135deg,rgba(120,210,255,.22),rgba(255,120,220,.18));border:1px solid rgba(255,255,255,.20);text-align:left;font-weight:900;color:#3a1806;cursor:pointer}.choice small{display:block;color:#7a4a2c;font-weight:700;margin-top:3px}.tiny{font-size:11px;color:#7b4b2c}.toast{position:fixed;left:18px;right:18px;bottom:24px;z-index:4;text-align:center;font-weight:900;font-size:17px;text-shadow:0 3px 8px #000;pointer-events:none;background:rgba(50,20,5,.75);border-radius:16px;padding:8px 14px;backdrop-filter:blur(8px)}.hidden{display:none!important}
</style></head><body>
<canvas id="game"></canvas>
<div class="hud">
  <div class="pill" id="h1">🐱 Alpha 2.0</div>
  <div class="pill" id="h2">🐾 Cats 1</div>
  <div class="pill" id="h3">🐟 Fish 0</div>
</div>
<div class="bar"><i id="prog"></i></div>
<div class="toast hidden" id="toast"></div>
<div class="overlay" id="overlay"><div class="card" id="card"></div></div>
<script>
(()=>{'use strict';
const c=document.getElementById('game'),x=c.getContext('2d',{alpha:false});
const overlay=document.getElementById('overlay'),card=document.getElementById('card'),h1=document.getElementById('h1'),h2=document.getElementById('h2'),h3=document.getElementById('h3'),prog=document.getElementById('prog'),toast=document.getElementById('toast');
let W=innerWidth,H=innerHeight,DPR=1,last=0,state='menu',level=1,chapter=0,run=null,drag=false,startX=0,startPX=0,shake=0,msgT=0,msg='';
const SAVE='paws_claws_v2_';
let fish=+(localStorage.getItem(SAVE+'fish')||0),unlocked=+(localStorage.getItem(SAVE+'unlocked')||1);
let ups={fire:+(localStorage.getItem(SAVE+'fire')||0),dmg:+(localStorage.getItem(SAVE+'dmg')||0),start:0,gates:+(localStorage.getItem(SAVE+'gates')||0)};
try{localStorage.removeItem(SAVE+'start')}catch(e){}
const TOTAL=75;
const chapters=[
  ['Human Kitchen','🥛','#ffb25c','#ffdca0','Giant Bulldog'],
  ['Back Alley','🐾','#ffdca0','#ff8f6b','Rat King'],
  ['Giant Garden','🌿','#9ee67f','#ffd35e','Doberman Ranger'],
  ['Pet Store','🏪','#8ee7ff','#ff8eea','Alpha Pitbull'],
  ['Trash District','🦝','#b7c776','#ffb15c','Raccoon King'],
  ['Sewer Kingdom','🐀','#90d18d','#77533b','Rat Emperor'],
  ['Delivery Zone','📦','#ffcc72','#8bb8ff','The Mailman'],
  ['Smart Home','🤖','#d8e6ff','#ff5d5d','Vacuum 9000'],
  ['Dog Park','🐕','#ff8a5e','#ff8a35','Doberman Rex'],
  ['Dog Fortress','🐕','#ff8a5e','#ff4267','Dog Emperor Rex'],
  ['Luxury Mansion','🏡','#ffe2a6','#c886ff','Royal Poodle'],
  ['Moon Cat Base','🌕','#d8e6ff','#785cff','Cyber Hound'],
  ['Kennel Citadel','🏰','#c886ff','#ff4d9d','Cerberus'],
  ['Harbor Fish Market','🐟','#65d7ff','#2d53ff','Kraken Collar'],
  ['Final Dog Kingdom','🚧','#ffffff','#ff67d8','Omega Dog Gate']
];
const skins={
  blue:{n:'Alley Cats',cost:0,body:'#d98a35',head:'#ffbe73',acc:'none'},
  green:{n:'Garden Cats',cost:650,body:'#58b957',head:'#bdf27a',acc:'bandana'},
  red:{n:'Calico Crew',cost:900,body:'#d9432f',head:'#ffcf8a',acc:'cape'},
  purple:{n:'Royal Cats',cost:1250,body:'#7b42ff',head:'#ff8eea',acc:'crown'},
  gold:{n:'Golden Paws',cost:1750,body:'#f0a915',head:'#fff06a',acc:'helm'},
  shadow:{n:'Ninja Cats',cost:2400,body:'#202638',head:'#b6c5ff',acc:'none'}
};
const bullets={yellow:{n:'Yarn Balls',cost:0,col:'#fff2a1'},cyan:{n:'Milk Splash',cost:550,col:'#76f7ff'},pink:{n:'Pink Paw Blasts',cost:760,col:'#ff71dc'},green:{n:'Catnip Shots',cost:1050,col:'#76ff42'},orange:{n:'Tuna Sparks',cost:1450,col:'#ff9b3d'},white:{n:'Star Whiskers',cost:2100,col:'#ffffff'}};
const guns={ar:{n:'Claw Blaster',cost:0,desc:'Balanced range, damage and fire rate.',fr:1,dmg:1,range:.672,pierce:0,multi:0,spread:1,size:1},shotgun:{n:'Furball Cannon',cost:1350,desc:'More pellets, higher close damage, low range.',fr:.78,dmg:1.18,range:.43,pierce:0,multi:3,spread:1.85,size:1.15},smg:{n:'Scratch SMG',cost:1700,desc:'High fire rate, lower damage and range.',fr:1.42,dmg:.76,range:.50,pierce:0,multi:0,spread:1.18,size:.9},sniper:{n:'Laser Pointer',cost:2400,desc:'Long range, slower fire, pierces one extra mob.',fr:.55,dmg:1.45,range:.92,pierce:1,multi:0,spread:.55,size:1.18},burst:{n:'Triple Yarn Rifle',cost:3200,desc:'Three extra shots, stable.',fr:.92,dmg:.92,range:.62,pierce:0,multi:2,spread:.82,size:1}};
let shop={skin:localStorage.getItem(SAVE+'skin')||'blue',bullet:localStorage.getItem(SAVE+'bullet')||'yellow',gun:localStorage.getItem(SAVE+'gun')||'ar',ownedSkins:JSON.parse(localStorage.getItem(SAVE+'ownedSkins')||'["blue"]'),ownedBullets:JSON.parse(localStorage.getItem(SAVE+'ownedBullets')||'["yellow"]'),ownedGuns:JSON.parse(localStorage.getItem(SAVE+'ownedGuns')||'["ar"]')};
function owns(arr,k){return arr.indexOf(k)>=0}
function saveShop(){localStorage.setItem(SAVE+'skin',shop.skin);localStorage.setItem(SAVE+'bullet',shop.bullet);localStorage.setItem(SAVE+'gun',shop.gun);localStorage.setItem(SAVE+'ownedSkins',JSON.stringify(shop.ownedSkins));localStorage.setItem(SAVE+'ownedBullets',JSON.stringify(shop.ownedBullets));localStorage.setItem(SAVE+'ownedGuns',JSON.stringify(shop.ownedGuns))}
unlocked=clamp(Math.floor(unlocked)||1,1,TOTAL);fish=Math.max(0,Math.floor(fish)||0);
function save(){unlocked=clamp(Math.floor(unlocked)||1,1,TOTAL);fish=Math.max(0,Math.floor(fish)||0);for(const k in ups)localStorage.setItem(SAVE+k,ups[k]);localStorage.setItem(SAVE+'fish',fish);localStorage.setItem(SAVE+'unlocked',unlocked)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rnd(a,b){return a+Math.random()*(b-a)}
function pick(a){return a[(Math.random()*a.length)|0]}
function resize(){DPR=Math.min(1.35,devicePixelRatio||1);W=innerWidth;H=innerHeight;c.width=W*DPR;c.height=H*DPR;x.setTransform(DPR,0,0,DPR,0,0)}
addEventListener('resize',resize);resize();

// ─── UI HTML ────────────────────────────────────────────────────────────────
function htmlHome(){
  const ch=clamp(Math.floor((unlocked-1)/5),0,chapters.length-1);
  const cp=chapters[ch]||chapters[chapters.length-1];
  card.innerHTML=`
    <div style="background:linear-gradient(180deg,#f9c98a,#e8a050);border-radius:20px;padding:14px 10px 10px;margin-bottom:14px;border:2px solid rgba(255,255,255,.3)">
      <div style="font-size:13px;font-weight:900;color:#a04010;letter-spacing:2px">🐾 &nbsp; PAWS &amp; CLAWS &nbsp; 🐾</div>
      <div style="font-size:34px;font-weight:1000;color:#5a1e06;text-shadow:0 3px 0 #ffd080,0 6px 14px rgba(80,20,0,.3);letter-spacing:-1px;margin:2px 0">Paws &amp; Claws</div>
      <div style="font-size:13px;color:#7a3810;font-weight:700">Vrolijk, kleurrijk en super schattig 🐱</div>
    </div>
    <div class=chapter><b>${cp[1]} Chapter ${ch+1}: ${cp[0]}</b><br><span class=tiny>Niveau ${unlocked}/${TOTAL} · Boss: ${cp[4]}</span></div>
    <button class="btn gold" id=play>▶ SPEEL NU</button>
    <button class="btn blue" id=chap>🗺 Chapters</button>
    <button class="btn blue" id=upg>🐟 Upgrades</button>
    <button class="btn blue" id=sshop>🛍 Shop</button>
    <button class="btn dim" id=reset>Reset save</button>
    <p class=tiny>Fish: ${fish} 🐟 · ${guns[shop.gun].n} · ${skins[shop.skin].n}</p>`;
  overlay.classList.remove('hidden');
  document.getElementById('play').onclick=()=>startLevel(clamp(unlocked,1,TOTAL));
  document.getElementById('chap').onclick=htmlChapters;
  document.getElementById('upg').onclick=htmlUpgrades;
  document.getElementById('sshop').onclick=htmlShop;
  document.getElementById('reset').onclick=htmlReset;
}
function htmlChapters(){
  let out='<div class=logo>🗺️</div><h1>Cat Territories</h1>';
  for(let ci=0;ci<chapters.length;ci++){
    let cp=chapters[ci];
    out+=`<div class=chapter><b>${cp[1]} ${cp[0]}</b><br><span class=tiny>Boss: ${cp[4]}</span><div class=lvlrow>`;
    for(let i=1;i<=5;i++){let lv=ci*5+i,cls=lv<unlocked?'done':lv>unlocked?'lock':'';out+=`<button class="lvl ${cls}" data-lv=${lv} ${lv>unlocked?'disabled':''}>${lv<unlocked?'✓':''}${lv}</button>`}
    out+='</div></div>'
  }
  out+='<button class="btn dim" id=back>← Terug</button>';
  card.innerHTML=out;
  document.getElementById('back').onclick=htmlHome;
  card.querySelectorAll('[data-lv]').forEach(b=>b.onclick=()=>startLevel(+b.dataset.lv));
}
function htmlUpgrades(){
  function cost(k){return[140,210,310,450,640,880,1180,1550][ups[k]]||2100}
  card.innerHTML=`<div class=logo>🧶</div><h1>Cat Upgrades</h1><p class=muted>🐟 Fish: <b>${fish}</b></p><div class=upgrade>${[['fire','🌿 Catnip Speed'],['dmg','🐟 Tuna Damage'],['gates','🐾 Better Shelters']].map(([k,n])=>`<button class=up data-up=${k}>${n}<br><span class=tiny>Lvl ${ups[k]} · ${cost(k)} fish</span></button>`).join('')}</div><button class="btn dim" id=back>← Terug</button>`;
  document.getElementById('back').onclick=htmlHome;
  card.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>{let k=b.dataset.up,co=cost(k);if(fish>=co){fish-=co;ups[k]++;save();htmlUpgrades()}else pop('Te weinig fish! 🐟')});
}
function htmlShop(){
  let tab='guns';
  function row(type,key,it,owned,equipped){
    let can=fish>=it.cost;
    let label=owned?(equipped?'✓ Equipped':'Equip'):(it.cost+' 🐟');
    let lock=!owned&&!can?' lock':'';
    return `<button class="up${lock}" data-type="${type}" data-key="${key}"><b>${it.n}</b><br><span class=tiny>${it.desc||'Cat cosmetic'}<br>${label}</span></button>`;
  }
  function render(t){
    tab=t||tab;
    let out=`<div class=logo>🐟</div><h1>Fish Shop</h1><p class=muted>Fish: <b>${fish}</b> 🐟</p><div class=tabs><button class="btn ${tab==='guns'?'gold':'blue'}" data-tab=guns>Wapens</button><button class="btn ${tab==='skins'?'gold':'blue'}" data-tab=skins>Army</button><button class="btn ${tab==='bullets'?'gold':'blue'}" data-tab=bullets>Bullets</button></div><div class=upgrade>`;
    if(tab==='guns')for(const k in guns)out+=row('gun',k,guns[k],owns(shop.ownedGuns,k),shop.gun===k);
    if(tab==='skins')for(const k in skins)out+=row('skin',k,skins[k],owns(shop.ownedSkins,k),shop.skin===k);
    if(tab==='bullets')for(const k in bullets)out+=row('bullet',k,bullets[k],owns(shop.ownedBullets,k),shop.bullet===k);
    out+=`</div><button class="btn dim" id=back>← Terug</button>`;
    card.innerHTML=out;
    document.getElementById('back').onclick=htmlHome;
    card.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>render(b.dataset.tab));
    card.querySelectorAll('[data-type]').forEach(b=>b.onclick=()=>{
      let type=b.dataset.type,k=b.dataset.key,obj=type==='gun'?guns[k]:type==='skin'?skins[k]:bullets[k];
      let arr=type==='gun'?shop.ownedGuns:type==='skin'?shop.ownedSkins:shop.ownedBullets;
      if(!owns(arr,k)){if(fish<obj.cost){pop('Te weinig fish! 🐟');return}fish-=obj.cost;arr.push(k)}
      if(type==='gun')shop.gun=k;if(type==='skin')shop.skin=k;if(type==='bullet')shop.bullet=k;
      saveShop();save();render(tab);pop('Unlocked: '+obj.n);
    });
  }
  render(tab);
}
function pop(s){msg=s;msgT=1.4;toast.textContent=s;toast.classList.remove('hidden')}
function htmlReset(){
  card.innerHTML=`<div class=logo>⚠️</div><h1>Save resetten?</h1><p class=muted>Dit wist fish, upgrades en level progress.</p><button class="btn gold" id=resetYes>Ja, reset</button><button class="btn blue" id=resetNo>Annuleren</button>`;
  document.getElementById('resetYes').onclick=()=>{
    try{['fish','unlocked','fire','dmg','gates','start','skin','bullet','gun','ownedSkins','ownedBullets','ownedGuns'].forEach(k=>localStorage.removeItem(SAVE+k))}catch(e){}
    fish=0;unlocked=1;ups.fire=0;ups.dmg=0;ups.gates=0;
    shop={skin:'blue',bullet:'yellow',gun:'ar',ownedSkins:['blue'],ownedBullets:['yellow'],ownedGuns:['ar']};
    saveShop();save();pop('Save gereset!');htmlHome();
  };
  document.getElementById('resetNo').onclick=htmlHome;
}

// ─── GAME LOGIC (unchanged) ──────────────────────────────────────────────────
function levelConfig(lv){
  let ci=Math.floor((lv-1)/5),boss=lv%5===0;
  let dur=boss?68+Math.min(10,ci*1.2):50+Math.min(8,ci*.9);
  return{lv,ci,boss,dur,goal:boss?132+lv*3.6+ci*8:102+lv*2.9+ci*6,speed:96+ci*5+lv*.45,spawn:boss?.62:.58,hp:.92+lv*.038,gateEvery:boss?27.0:24.0,crystalEvery:boss?16.5:15.0,lives:4+Math.floor(lv/8),bossName:(chapters[ci]||chapters[chapters.length-1])[4]};
}
function stage(){if(!run)return 0;return run.spawned/Math.max(1,run.L.goal)}
function crystalLabel(k){return k==='pierce'?'CLAW':k==='ricochet'?'LASER':k==='bolt'?'SPARK':k==='rapid'?'CATNIP':k==='damage'?'TUNA':k==='multi'?'YARN':k==='poison'?'HAIRBALL':k==='crit'?'CRIT':'TOY'}
function crystalColor(k){return k==='pierce'?'#c783ff':k==='ricochet'?'#76f7ff':k==='bolt'?'#fff06a':k==='rapid'?'#65d7ff':k==='damage'?'#ff8d45':k==='multi'?'#8dff86':k==='poison'?'#76ff42':k==='crit'?'#ff65d7':'#8ee7ff'}
function startLevel(lv){
  lv=clamp(Math.floor(lv)||1,1,TOTAL);level=lv;chapter=clamp(Math.floor((lv-1)/5),0,chapters.length-1);
  const L=levelConfig(lv),cp=chapters[chapter]||chapters[chapters.length-1];
  run={L,cp,t:0,road:0,spawnT:.85,gateT:8.2,crysT:9.0,bossSpawned:false,done:false,player:{x:W/2,y:H-160,tx:W/2,squad:1,fire:0,fr:(1+ups.fire*.045)*(guns[shop.gun].fr||1),dmg:(1+ups.dmg*.055)*(guns[shop.gun].dmg||1),range:guns[shop.gun].range||.648,basePierce:guns[shop.gun].pierce||0,gunMulti:guns[shop.gun].multi||0,gunSpread:guns[shop.gun].spread||1,bulletSize:guns[shop.gun].size||1,pierce:0,chain:0,crit:.03,poison:0,multi:0},bul:[],mobs:[],gates:[],crys:[],fx:[],texts:[],kills:0,spawned:0,lives:L.lives,fishGot:0,builds:[],phase:'run'};
  overlay.classList.add('hidden');state='play';updateHud();
}
function complete(){
  state='menu';let r=run;fish+=r.fishGot+Math.floor(r.kills/3)+10;
  if(level>=unlocked&&unlocked<TOTAL)unlocked=level+1;save();
  card.innerHTML=`<div class=logo>🏆</div><h1>Territory Cleared!</h1><p class=muted>Enemies ${r.kills} · Fish +${r.fishGot+Math.floor(r.kills/3)+10} 🐟 · Cats ${r.player.squad}</p><button class="btn gold" id=next>${level<TOTAL?'Next Level ▶':'Home'}</button><button class="btn blue" id=home>Menu</button>`;
  overlay.classList.remove('hidden');
  document.getElementById('next').onclick=()=>level<TOTAL?startLevel(level+1):htmlHome();
  document.getElementById('home').onclick=htmlHome;
}
function fail(){
  state='menu';
  card.innerHTML=`<div class=logo>😿</div><h1>Cats Scattered!</h1><p class=muted>Level ${level}. Upgrade je cats of probeer een andere strategie!</p><button class="btn gold" id=retry>Retry</button><button class="btn blue" id=home>Menu</button>`;
  overlay.classList.remove('hidden');
  document.getElementById('retry').onclick=()=>startLevel(level);
  document.getElementById('home').onclick=htmlHome;
}
function applyCrystalBonus(k){
  let p=run.player,label=crystalLabel(k);
  if(k==='rapid')p.fr*=1.22;if(k==='damage')p.dmg*=1.18;if(k==='pierce')p.pierce=Math.max(p.pierce,8);
  if(k==='ricochet'){p.chain=Math.min(3,p.chain+1);p.pierce=Math.max(p.pierce,3)}
  if(k==='bolt'){p.chain=Math.min(4,p.chain+2);p.dmg*=1.08}
  if(k==='poison')p.poison=Math.min(3,p.poison+1);if(k==='multi')p.multi=Math.min(8,p.multi+1);if(k==='crit')p.crit+=.10;
  run.builds.push(label);pop('✨ '+label);addText(label,run.player.x,run.player.y-90,crystalColor(k));
}
function updateHud(){
  if(!run){h1.textContent='🐱 Alpha 2.0';h2.textContent='🐾 Cats 1';h3.textContent='🐟 Fish '+fish;prog.style.width='0';return}
  h1.textContent=`🐱 C${run.L.ci+1}-${((level-1)%5)+1}${run.L.boss?' BOSS':''}`;
  h2.textContent='🐾 '+run.player.squad+' ❤️'+run.lives;
  h3.textContent='🐟 '+(fish+run.fishGot)+' · 🦴 '+run.kills+'/'+run.L.goal;
  prog.style.width=clamp(run.kills/run.L.goal*100,0,100)+'%';
}
function spawnMob(kind){
  let r=run,L=r.L,ci=L.ci;
  if(kind==='boss'){kind=['kingChihuahua','bulldogChef','dobermanRanger','raccoonKing','ratEmperor','alphaPitbull','mailman','vacuum9000','royalPoodle','dogEmperorRex','cyberHound','cerberus','krakenCollar','crowBaron','omegaDogGate'][ci]||'boss'}

  }
  // BEWARE OF DOG signs alongside path
  x.save();x.globalAlpha=.85;

  x.restore();
  // Paw print tracks on floor

  if(run){for(let i=0;i<12;i++){let px=(i*103+run.road*.15)%W,py=H*.50+((i*67+run.road*.25)%(H*.48));drawPawPrint(px,py,9)}}

  x.fillStyle='rgba(255,255,255,.55)';x.beginPath();x.ellipse(10,50,28,8,0.3,0,Math.PI*2);x.fill();

function drawCatBowl(bx,by){

function drawYarnBall(yx,yy,r,col){

function drawCardboardBox(bx,by){

function drawFishBone(fx,fy,size){
  x.save();x.translate(fx,fy);
  x.strokeStyle='rgba(180,120,60,.6)';x.lineWidth=2;
  x.beginPath();x.moveTo(-size,0);x.lineTo(size,0);x.stroke();

function drawPawPrint(px,py,size){
  x.beginPath();x.ellipse(px,py+size*.4,size*.5,size*.35,0,0,Math.PI*2);x.fill();

// ─── DRAW CAT (hero) ─────────────────────────────────────────────────────────
function drawCat(cx,cy,bodyCol,headCol,accType,isLeader,size){
  let s=size||1;
  x.save();x.translate(cx,cy);x.scale(s,s);
  // Body
  x.fillStyle=bodyCol;rr(-7,-2,14,13,5);x.fill();
  // Tail
  x.strokeStyle=bodyCol;x.lineWidth=3.5;x.lineCap='round';
  x.beginPath();x.moveTo(7,8);x.bezierCurveTo(18,4,20,-8,14,-12);x.stroke();
  // Head
  x.fillStyle=headCol;x.beginPath();x.arc(0,-13,9,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(0,0,0,.15)';x.lineWidth=1;x.stroke();
  // Ears
  x.fillStyle=headCol;
  x.beginPath();x.moveTo(-7,-19);x.lineTo(-12,-27);x.lineTo(-2,-20);x.closePath();x.fill();
  x.beginPath();x.moveTo(7,-19);x.lineTo(12,-27);x.lineTo(2,-20);x.closePath();x.fill();
  // Inner ear pink
  x.fillStyle='rgba(255,160,180,.7)';
  x.beginPath();x.moveTo(-7,-20);x.lineTo(-10,-25);x.lineTo(-4,-20);x.closePath();x.fill();
  x.beginPath();x.moveTo(7,-20);x.lineTo(10,-25);x.lineTo(4,-20);x.closePath();x.fill();
  // Eyes
  x.fillStyle='#fff';
  x.beginPath();x.ellipse(-3.5,-14,2.8,2.8,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(3.5,-14,2.8,2.8,0,0,Math.PI*2);x.fill();
  // Pupils
  x.fillStyle='#1a0a00';
  x.beginPath();x.ellipse(-3.5,-14,1.5,1.8,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(3.5,-14,1.5,1.8,0,0,Math.PI*2);x.fill();
  // Eye shine
  x.fillStyle='rgba(255,255,255,.9)';
  x.beginPath();x.arc(-2.5,-13.5,.9,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(4.5,-13.5,.9,0,Math.PI*2);x.fill();
  // Nose
  x.fillStyle='#e87090';x.beginPath();x.ellipse(0,-10.5,1.6,1.2,0,0,Math.PI*2);x.fill();
  // Mouth
  x.strokeStyle='rgba(0,0,0,.5)';x.lineWidth=1;x.beginPath();x.moveTo(0,-9.5);x.lineTo(-2,-7.5);x.moveTo(0,-9.5);x.lineTo(2,-7.5);x.stroke();
  // Whiskers
  x.strokeStyle='rgba(255,255,255,.85)';x.lineWidth=.9;
  x.beginPath();x.moveTo(-2,-10);x.lineTo(-11,-8.5);x.stroke();
  x.beginPath();x.moveTo(-2,-10);x.lineTo(-11,-11.5);x.stroke();
  x.beginPath();x.moveTo(2,-10);x.lineTo(11,-8.5);x.stroke();
  x.beginPath();x.moveTo(2,-10);x.lineTo(11,-11.5);x.stroke();
  // Paws
  x.fillStyle=bodyCol;
  x.beginPath();x.ellipse(-5,11,3,2,-.2,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(5,11,3,2,.2,0,Math.PI*2);x.fill();
  // Accessory
  if(accType==='crown'||isLeader){
    x.fillStyle='#ffd700';
    x.beginPath();x.moveTo(-7,-22);x.lineTo(-5,-30);x.lineTo(-1,-24);x.lineTo(0,-32);x.lineTo(1,-24);x.lineTo(5,-30);x.lineTo(7,-22);x.closePath();x.fill();
    x.strokeStyle='#c8a000';x.lineWidth=1;x.stroke();
    x.fillStyle='#ff4444';x.beginPath();x.arc(0,-31,1.8,0,Math.PI*2);x.fill();
  } else if(accType==='bandana'){
    x.fillStyle='#ff4444';rr(-6,-5,12,4,2);x.fill();
    x.strokeStyle='#cc0000';x.lineWidth=1;rr(-6,-5,12,4,2);x.stroke();
  } else if(accType==='cape'){
    x.fillStyle='#6600cc';x.beginPath();x.moveTo(-7,0);x.lineTo(-10,12);x.lineTo(10,12);x.lineTo(7,0);x.fill();
    x.fillStyle='#ff0';x.beginPath();x.arc(0,2,1.5,0,Math.PI*2);x.fill();
  } else if(accType==='helm'){
    x.fillStyle='#888ea8';rr(-9,-24,18,12,6);x.fill();
    x.strokeStyle='#6a7080';x.lineWidth=1.5;rr(-9,-24,18,12,6);x.stroke();
  }
  x.restore();
}

// ─── DRAW SQUAD ──────────────────────────────────────────────────────────────
function drawSquad(){
  let p=run.player,sk=skins[shop.skin]||skins.blue;
  let n=Math.min(p.squad,28),cols=Math.min(7,n);
  for(let i=n-1;i>=0;i--){
    let row=(i/cols)|0,col=i%cols;
    let cx=p.x+(col-(cols-1)/2)*14,cy=p.y+row*13;
    let isLead=i===0;
    drawCat(cx,cy,sk.body,sk.head,isLead?(sk.acc||'crown'):sk.acc,isLead,.9);
  }
  if(p.squad>n){
    x.fillStyle='rgba(50,20,5,.65)';rr(p.x+38,p.y-46,65,26,13);x.fill();
    x.fillStyle='#ffe97a';x.font='900 13px system-ui';x.textAlign='center';
    x.fillText('+'+(p.squad-n),p.x+70,p.y-29);
  }
}

function mobName(k){return{kingChihuahua:'KING CHIHUAHUA',bulldogChef:'BULLDOG CHEF',dobermanRanger:'DOBERMAN',raccoonKing:'RACCOON KING',ratEmperor:'RAT EMPEROR',alphaPitbull:'PITBULL',mailman:'MAILMAN',vacuum9000:'VACUUM 9000',royalPoodle:'ROYAL POODLE',dogEmperorRex:'DOG EMPEROR',cyberHound:'CYBER HOUND',cerberus:'CERBERUS',krakenCollar:'KRAKEN',crowBaron:'CROW BARON',omegaDogGate:'OMEGA DOG',chihuahua:'CHIHUAHUA',rat:'RAT',pigeon:'PIGEON',puppy:'PUPPY',mopDog:'MOP DOG',poodle:'POODLE',bulldog:'BULLDOG',mouse:'MOUSE',squirrel:'SQUIRREL',doberman:'DOBERMAN',crow:'CROW',gnome:'GNOME',raccoon:'RACCOON',trashRat:'TRASH RAT',opossum:'OPOSSUM',sewerDog:'SEWER DOG',robotVacuum:'VACUUM',drone:'DRONE',rottweiler:'ROTTWEILER',dogCatcher:'DOG CATCHER',dogTrainer:'TRAINER'}[k]||String(k||'DOG').toUpperCase()}

function drawDogFace(r,col,kind){
  let hitFlash=false;
  // Body
  x.fillStyle=col;
  if(kind==='chihuahua'||kind==='puppy'){
    x.beginPath();x.ellipse(0,0,r*.8,r,0,0,Math.PI*2);x.fill();
  } else if(kind==='bulldog'||kind==='bulldogChef'||kind==='kingChihuahua'){
    x.beginPath();x.ellipse(0,0,r*1.1,r*.9,0,0,Math.PI*2);x.fill();
  } else {
    x.beginPath();x.ellipse(0,0,r,r,0,0,Math.PI*2);x.fill();
  }
  x.strokeStyle='rgba(40,10,0,.4)';x.lineWidth=1.5;x.stroke();
  // Ears by kind
  if(kind==='chihuahua'||kind==='kingChihuahua'){
    // Big pointy ears
    x.fillStyle=col;
    x.beginPath();x.moveTo(-r*.6,-r*.4);x.lineTo(-r*1.3,-r*1.1);x.lineTo(-r*.1,-r*.5);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.6,-r*.4);x.lineTo(r*1.3,-r*1.1);x.lineTo(r*.1,-r*.5);x.closePath();x.fill();

    x.beginPath();x.moveTo(-r*.6,-r*.45);x.lineTo(-r*1.1,-r*1.0);x.lineTo(-r*.2,-r*.55);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.6,-r*.45);x.lineTo(r*1.1,-r*1.0);x.lineTo(r*.2,-r*.55);x.closePath();x.fill();
  } else if(kind==='poodle'||kind==='royalPoodle'){
    // Poodle pom-pom ears
    x.fillStyle='#e87ad8';
    x.beginPath();x.arc(-r*.7,-r*.3,r*.45,0,Math.PI*2);x.fill();
    x.beginPath();x.arc(r*.7,-r*.3,r*.45,0,Math.PI*2);x.fill();
    x.strokeStyle='#c050b0';x.lineWidth=1.5;
    x.beginPath();x.arc(-r*.7,-r*.3,r*.45,0,Math.PI*2);x.stroke();
    x.beginPath();x.arc(r*.7,-r*.3,r*.45,0,Math.PI*2);x.stroke();
  } else if(kind==='bulldog'||kind==='bulldogChef'||kind==='alphaPitbull'){
    // Floppy ears
    x.fillStyle=kind==='alphaPitbull'?'#8a4a2a':'#c08050';
    x.beginPath();x.moveTo(-r*.7,-r*.2);x.bezierCurveTo(-r*1.2,-r*.1,-r*1.1,r*.5,-r*.7,r*.3);x.lineTo(-r*.4,r*.1);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.7,-r*.2);x.bezierCurveTo(r*1.2,-r*.1,r*1.1,r*.5,r*.7,r*.3);x.lineTo(r*.4,r*.1);x.closePath();x.fill();
  } else if(kind==='doberman'||kind==='dobermanRanger'||kind==='dogEmperorRex'){
    // Pointy doberman ears
    x.fillStyle=kind==='dogEmperorRex'?'#5a1a00':'#3a1800';
    x.beginPath();x.moveTo(-r*.5,-r*.5);x.lineTo(-r*.8,-r*1.2);x.lineTo(-r*.1,-r*.6);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.5,-r*.5);x.lineTo(r*.8,-r*1.2);x.lineTo(r*.1,-r*.6);x.closePath();x.fill();
  } else {
    // Default floppy
    x.fillStyle=col;
    x.beginPath();x.moveTo(-r*.6,-r*.3);x.bezierCurveTo(-r*1.0,0,-r*.9,r*.4,-r*.5,r*.2);x.lineTo(-r*.3,0);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.6,-r*.3);x.bezierCurveTo(r*1.0,0,r*.9,r*.4,r*.5,r*.2);x.lineTo(r*.3,0);x.closePath();x.fill();
  }
  // Eyes
  x.fillStyle='#fff';
  x.beginPath();x.ellipse(-r*.32,-r*.15,r*.18,r*.18,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(r*.32,-r*.15,r*.18,r*.18,0,0,Math.PI*2);x.fill();
  // Pupils
  x.fillStyle=kind==='doberman'||kind==='dogEmperorRex'?'#ff2200':'#1a0800';
  x.beginPath();x.ellipse(-r*.32,-r*.15,r*.09,r*.11,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(r*.32,-r*.15,r*.09,r*.11,0,0,Math.PI*2);x.fill();
  // Shine
  x.fillStyle='rgba(255,255,255,.9)';
  x.beginPath();x.arc(-r*.26,-r*.19,r*.05,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(r*.38,-r*.19,r*.05,0,Math.PI*2);x.fill();

  x.beginPath();x.ellipse(0,r*.15,r*.28,r*.22,0,0,Math.PI*2);x.fill();
  x.fillStyle='#1a0800';
  x.beginPath();x.ellipse(-r*.10,r*.13,r*.07,r*.07,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(r*.10,r*.13,r*.07,r*.07,0,0,Math.PI*2);x.fill();

    x.beginPath();x.ellipse(-r*.22,r*.35,r*.22,r*.14,-.2,0,Math.PI*2);x.fill();
    x.beginPath();x.ellipse(r*.22,r*.35,r*.22,r*.14,.2,0,Math.PI*2);x.fill();

    x.beginPath();x.moveTo(0,r*.25);x.lineTo(-r*.18,r*.38);x.moveTo(0,r*.25);x.lineTo(r*.18,r*.38);x.stroke();
  }
}

function drawPigeon(r){

  x.fillStyle='#7888a0';
  x.save();x.rotate(-.3);x.beginPath();x.ellipse(-r*.9,-r*.3,r*.7,r*.28,0,0,Math.PI*2);x.fill();x.restore();
  x.save();x.rotate(.3);x.beginPath();x.ellipse(r*.9,-r*.3,r*.7,r*.28,0,0,Math.PI*2);x.fill();x.restore();
  // Head
  x.fillStyle='#6878a0';x.beginPath();x.arc(0,-r*.7,r*.42,0,Math.PI*2);x.fill();
  // Iridescent neck
  x.fillStyle='rgba(80,220,180,.35)';x.beginPath();x.ellipse(0,-r*.15,r*.4,r*.3,0,0,Math.PI*2);x.fill();
  // Eye
  x.fillStyle='#fff';x.beginPath();x.arc(r*.15,-r*.72,r*.12,0,Math.PI*2);x.fill();
  x.fillStyle='#ff6600';x.beginPath();x.arc(r*.15,-r*.72,r*.07,0,Math.PI*2);x.fill();
  x.fillStyle='#1a0800';x.beginPath();x.arc(r*.15,-r*.72,r*.04,0,Math.PI*2);x.fill();
  // Beak
  x.fillStyle='#c0a060';x.beginPath();x.moveTo(r*.2,-r*.8);x.lineTo(r*.55,-r*.8);x.lineTo(r*.2,-r*.7);x.closePath();x.fill();
}

function drawRobotVacuum(r){
  // Flat round body
  x.fillStyle='#c8c8c8';x.beginPath();x.ellipse(0,0,r*1.1,r*.7,0,0,Math.PI*2);x.fill();
  x.strokeStyle='#888';x.lineWidth=2;x.stroke();
  // Top dome
  x.fillStyle='#e0e0e0';x.beginPath();x.ellipse(0,-r*.2,r*.9,r*.5,0,Math.PI,Math.PI*2);x.fill();
  // Red eye/sensor
  x.fillStyle='#cc1100';x.beginPath();x.arc(0,-r*.1,r*.22,0,Math.PI*2);x.fill();
  // Glow
  x.fillStyle='rgba(255,80,40,.35)';x.beginPath();x.arc(0,-r*.1,r*.32,0,Math.PI*2);x.fill();
  // Pupil shine
  x.fillStyle='rgba(255,255,255,.7)';x.beginPath();x.arc(-r*.07,-r*.17,r*.07,0,Math.PI*2);x.fill();
  // Intake
  x.fillStyle='#555';x.beginPath();x.ellipse(0,r*.4,r*.55,r*.2,0,0,Math.PI*2);x.fill();
  // Buttons row
  x.fillStyle='#444';
  for(let i=-1;i<=1;i++){x.beginPath();x.arc(i*r*.28,-r*.38,r*.07,0,Math.PI*2);x.fill()}
}

function drawMob(m){
  x.save();x.translate(m.x+Math.sin(m.wob)*3,m.y);
  if(m.hit>0)x.translate(rnd(-2,2),rnd(-2,2));
  let r=m.r;
  let kind=m.kind;
  let isDog=['chihuahua','puppy','mopDog','poodle','bulldog','doberman','sewerDog','rottweiler','dogTrainer','kingChihuahua','bulldogChef','dobermanRanger','alphaPitbull','royalPoodle','dogEmperorRex','cyberHound','cerberus'].includes(kind);
  let isRaccoon=['raccoon','raccoonKing','opossum'].includes(kind);
  let isRat=['rat','mouse','trashRat','ratEmperor','squirrel'].includes(kind);
  let isBird=['pigeon','crow','crowBaron'].includes(kind);
  let isRobot=['robotVacuum','drone','vacuum9000','dogCatcher','omegaDogGate'].includes(kind);
  // Pick body color by kind
  let col=kind==='chihuahua'||kind==='kingChihuahua'?'#d4a868':
          kind==='bulldog'||kind==='bulldogChef'?'#c07850':
          kind==='poodle'||kind==='royalPoodle'?'#f0a0e8':
          kind==='doberman'||kind==='dobermanRanger'?'#3a2010':
          kind==='dogEmperorRex'?'#602010':
          kind==='alphaPitbull'?'#a06040':
          kind==='cerberus'?'#2a1408':
          kind==='cyberHound'?'#405080':
          kind==='rottweiler'?'#2a1808':
          kind==='sewerDog'?'#6a7040':
          isDog?'#b07848':
          isRaccoon?'#7a7a8a':
          isRat?'#7a6a6a':
          isBird?'#8898a8':
          isRobot?'#c8c8c8':'#7a7a8a';
  if(isRobot){drawRobotVacuum(r)}
  else if(isBird){drawPigeon(r)}
  else if(isRaccoon){drawRaccoon(r)}
  else if(isRat){drawRat(r)}
  else{drawDogFace(r,col,kind)}
  // Boss accessories
  if(m.boss){
    if(kind==='kingChihuahua'||kind==='dogEmperorRex'||kind==='ratEmperor'||kind==='royalPoodle'||kind==='cerberus'){
      // Crown
      x.fillStyle='#ffd700';
      x.beginPath();x.moveTo(-r*.6,-r-4);x.lineTo(-r*.4,-r-20);x.lineTo(-r*.1,-r-10);x.lineTo(0,-r-24);x.lineTo(r*.1,-r-10);x.lineTo(r*.4,-r-20);x.lineTo(r*.6,-r-4);x.closePath();x.fill();
      x.strokeStyle='#c8a000';x.lineWidth=1.5;x.stroke();
      x.fillStyle='#ff2244';x.beginPath();x.arc(0,-r-23,3,0,Math.PI*2);x.fill();
    }
    if(kind==='cerberus'){
      // Extra 2 heads hinted
      x.fillStyle='rgba(42,20,8,.7)';
      x.beginPath();x.arc(-r*1.3,-r*.3,r*.5,0,Math.PI*2);x.fill();
      x.beginPath();x.arc(r*1.3,-r*.3,r*.5,0,Math.PI*2);x.fill();
      x.fillStyle='#fff';x.beginPath();x.arc(-r*1.2,-r*.38,r*.14,0,Math.PI*2);x.fill();x.beginPath();x.arc(r*1.4,-r*.38,r*.14,0,Math.PI*2);x.fill();
      x.fillStyle='#ff2200';x.beginPath();x.arc(-r*1.2,-r*.38,r*.07,0,Math.PI*2);x.fill();x.beginPath();x.arc(r*1.4,-r*.38,r*.07,0,Math.PI*2);x.fill();
    }
    if(kind==='mailman'){
      // Mailman hat
      x.fillStyle='#2244cc';rr(-r*.7,-r-16,r*1.4,12,4);x.fill();
      x.fillStyle='#1a3399';rr(-r*.9,-r-6,r*1.8,6,3);x.fill();
      x.fillStyle='#ffff00';x.font='bold 8px system-ui';x.textAlign='center';x.fillText('MAIL',0,-r-7);
    }
    if(kind==='vacuum9000'){
      // Upgrade - glowing red eye
      x.fillStyle='rgba(255,50,0,.5)';x.beginPath();x.arc(0,0,r*1.3,0,Math.PI*2);x.fill();
      x.font='bold 9px system-ui';x.textAlign='center';x.fillStyle='#ff8888';x.fillText('9000',0,r+14);
    }
    // Boss name label
    x.fillStyle='rgba(50,10,0,.7)';rr(-r-10,-r-46,r*2+20,18,8);x.fill();
    x.fillStyle='#ffe97a';x.font='bold 11px system-ui';x.textAlign='center';
    x.strokeStyle='rgba(0,0,0,.8)';x.lineWidth=3;
    x.strokeText(mobName(kind),0,-r-32);x.fillText(mobName(kind),0,-r-32);
  }
  // HP bar
  x.fillStyle='rgba(0,0,0,.55)';rr(-r,-r-16,r*2,6,3);x.fill();
  x.fillStyle=m.hp/m.max<.35?'#ff315d':'#75ff6f';rr(-r,-r-16,r*2*clamp(m.hp/m.max,0,1),6,3);x.fill();
  x.restore();
}

// ─── DRAW GATE ───────────────────────────────────────────────────────────────
function drawGate(g){
  let positive=(g.type==='add'||g.type==='minus')?Math.round(g.val)>=0:['add','mult'].includes(g.type);
  let bad=g.type==='slow'||g.type==='weak'||g.type==='half';
  if(bad)positive=false;
  x.save();x.translate(g.x,g.y);
  let sc=1+(g.pulse||0)*2;x.scale(sc,sc);
  // Gate card background
  let bg=positive?
    x.createLinearGradient(-g.w/2,-g.h/2,g.w/2,g.h/2):
    x.createLinearGradient(-g.w/2,-g.h/2,g.w/2,g.h/2);
  if(positive){bg.addColorStop(0,'#c0f0ff');bg.addColorStop(.5,'#a0d8ff');bg.addColorStop(1,'#80b8ff')}
  else{bg.addColorStop(0,'#ff9090');bg.addColorStop(.5,'#ff6060');bg.addColorStop(1,'#cc3030')}
  x.fillStyle=bg;rr(-g.w/2,-g.h/2,g.w,g.h,18);x.fill();
  // Border glow
  x.strokeStyle=positive?'#4ae0ff':'#ff2244';
  x.lineWidth=positive?4:4;
  rr(-g.w/2,-g.h/2,g.w,g.h,18);x.stroke();
  // Inner glow ring
  x.strokeStyle=positive?'rgba(180,250,255,.5)':'rgba(255,180,180,.5)';
  x.lineWidth=2;
  rr(-g.w/2+5,-g.h/2+5,g.w-10,g.h-10,13);x.stroke();
  // Main label
  let lab=(g.type==='add'||g.type==='minus')?(Math.round(g.val)>=0?'+'+Math.round(g.val):String(Math.round(g.val))):
           g.type==='half'?'÷2':g.type==='slow'?'CATNIP':g.type==='weak'?'CLAW':'x'+g.val.toFixed(1);
  x.textAlign='center';
  x.font='900 '+(lab.length>5?20:28)+'px system-ui';
  x.strokeStyle='rgba(0,0,0,.5)';x.lineWidth=5;x.strokeText(lab,0,-10);
  x.fillStyle=positive?'#003366':'#ffffff';x.fillText(lab,0,-10);
  // Sub label
  let sub=positive?(g.type==='mult'?'x CATS':(g.type==='add'||g.type==='minus')?'+CATS':'ADOPT'):
          g.type==='half'?'÷ CATS':g.type==='slow'?'x0.65 FIRE':'WEAK';
  x.font='bold 10px system-ui';
  x.fillStyle=positive?'rgba(0,50,100,.8)':'rgba(255,230,230,.9)';
  x.strokeStyle='rgba(0,0,0,.4)';x.lineWidth=3;
  x.strokeText(sub,0,12);x.fillText(sub,0,12);
  // Fish icon for add gates
  if(positive&&(g.type==='add'||g.type==='mult')){
    x.font='16px system-ui';x.fillText('🐟',0,35);
  } else if(!positive){
    x.font='16px system-ui';x.fillText('🐕',0,35);
  }
  x.restore();
}

// ─── DRAW CRYSTAL/TREASURE ───────────────────────────────────────────────────
function drawCrystal(o){
  x.save();x.translate(o.x,o.y);
  let col=o.kind==='coin'?'#ffe15e':crystalColor(o.power||'pierce');
  // Glow
  x.fillStyle=col.replace(')',', .18)').replace('rgb','rgba').replace('#','rgba(').replace(/rgba\(([0-9a-f]{6}), .18\)/i,()=>{
    let h=col.slice(1);
    let r=parseInt(h.slice(0,2),16),g2=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    return `rgba(${r},${g2},${b},0.22)`;
  });
  x.beginPath();x.arc(0,0,o.rad+10,0,Math.PI*2);x.fill();
  // Card body
  if(o.kind==='coin'){
    // Fish shaped
    x.fillStyle='#ffe87a';rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.5);x.fill();
    x.strokeStyle='#c8a000';x.lineWidth=3;rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.5);x.stroke();
    x.font='22px system-ui';x.textAlign='center';x.fillText('🐟',0,8);
  } else {
    x.fillStyle='rgba(30,20,40,.8)';rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.4);x.fill();
    x.strokeStyle=col;x.lineWidth=3;rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.4);x.stroke();
    // Crystal gem
    x.fillStyle=col;
    x.beginPath();x.moveTo(0,-o.rad*.6);x.lineTo(o.rad*.5,0);x.lineTo(0,o.rad*.6);x.lineTo(-o.rad*.5,0);x.closePath();x.fill();
    x.fillStyle='rgba(255,255,255,.4)';
    x.beginPath();x.moveTo(0,-o.rad*.6);x.lineTo(o.rad*.5,0);x.lineTo(0,0);x.closePath();x.fill();
  }
  // Label
  let cl=o.kind==='coin'?'FISH':crystalLabel(o.power||'pierce');
  x.font='bold 9px system-ui';x.textAlign='center';
  x.strokeStyle='rgba(0,0,0,.8)';x.lineWidth=3;x.strokeText(cl,0,o.rad+3);
  x.fillStyle='#fff';x.fillText(cl,0,o.rad+3);
  // HP bar
  x.fillStyle='rgba(0,0,0,.5)';rr(-o.rad,-o.rad-14,o.rad*2,5,3);x.fill();
  x.fillStyle='#72ff7a';rr(-o.rad,-o.rad-14,o.rad*2*clamp(o.hp/o.max,0,1),5,3);x.fill();
  x.restore();
}

// ─── DRAW BULLETS ────────────────────────────────────────────────────────────
function drawBullet(b){
  let bc=(bullets[shop.bullet]||bullets.yellow).col;
  let col=b.pierce?'#c783ff':bc;
  x.fillStyle=col;
  // Yarn ball bullet
  if(shop.bullet==='yellow'){
    x.beginPath();x.arc(b.x,b.y,(b.pierce?4:3)*(b.size||1),0,Math.PI*2);x.fill();
    x.strokeStyle='rgba(255,255,100,.5)';x.lineWidth=1;
    x.beginPath();x.arc(b.x,b.y,(b.pierce?4:3)*(b.size||1),0,Math.PI*2);x.stroke();
  } else {
    x.beginPath();x.ellipse(b.x,b.y,(b.pierce?4:3)*(b.size||1),(b.pierce?12:9)*(b.size||1),0,0,Math.PI*2);x.fill();
  }
}

// ─── MAIN DRAW ───────────────────────────────────────────────────────────────
function draw(){
  x.setTransform(DPR,0,0,DPR,0,0);
  drawBg();
  if(run){
    x.save();
    if(shake>0){x.translate(rnd(-shake*16,shake*16),rnd(-shake*16,shake*16));shake*=.88}
    run.gates.forEach(drawGate);
    run.crys.forEach(drawCrystal);
    run.mobs.forEach(drawMob);
    run.bul.forEach(drawBullet);
    drawSquad();
    run.fx.forEach(f=>{x.globalAlpha=clamp(f.t*2,0,1);x.fillStyle=f.c;x.beginPath();x.arc(f.x,f.y,f.r,0,Math.PI*2);x.fill();x.globalAlpha=1});
    run.texts.forEach(t=>{
      x.globalAlpha=clamp(t.t*1.5,0,1);
      x.font='900 20px system-ui';x.textAlign='center';
      x.strokeStyle='rgba(0,0,0,.8)';x.lineWidth=5;x.strokeText(t.s,t.x,t.y);
      x.fillStyle=t.c;x.fillText(t.s,t.x,t.y);
      x.globalAlpha=1;
    });
    x.restore();
  }
  if(msgT>0){msgT-=.016;if(msgT<=0)toast.classList.add('hidden')}
}

function loop(ts){
  let dt=Math.min(.033,(ts-last)/1000||.016);last=ts;
  if(state==='play')update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
c.addEventListener('pointerdown',e=>{if(!run||state!=='play')return;drag=true;startX=e.clientX;startPX=run.player.tx});
c.addEventListener('pointermove',e=>{if(!drag||!run)return;run.player.tx=clamp(startPX+(e.clientX-startX)*1.08,W*.15,W*.85)});
addEventListener('pointerup',()=>drag=false);
addEventListener('pointercancel',()=>drag=false);

htmlHome();
requestAnimationFrame(loop);
})();
</script></body></html>
