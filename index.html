const MAX_DPR=IS_MOBILE?1:1.35;

function setAppHeight(h){document.documentElement.style.setProperty('--appH',Math.max(1,Math.round(h))+'px')}
function readViewport(){let vv=window.visualViewport;return{w:Math.round(vv?vv.width:innerWidth),h:Math.round(vv?vv.height:innerHeight)}}
function resize(force=false){
  const v=readViewport(),nw=Math.max(1,v.w),nh=Math.max(1,v.h);
  // Android/Chrome hides and shows browser bars while playing. Ignore small height-only changes
  // during gameplay to prevent canvas reallocations and visible stutter.
  if(!force&&state==='play'&&W&&nw===W&&Math.abs(nh-H)<120){setAppHeight(H);return}
  if(!force&&nw===W&&nh===H)return;
  W=nw;H=nh;DPR=Math.min(MAX_DPR,devicePixelRatio||1);
  setAppHeight(H);
  c.width=Math.max(1,Math.round(W*DPR));
  c.height=Math.max(1,Math.round(H*DPR));
  c.style.width=W+'px';c.style.height=H+'px';
  x.setTransform(DPR,0,0,DPR,0,0);
}

function playerStatsAtXp(rawXp){let p=playerLevelProgressFor(rawXp),g=guns[shop.gun]||guns.ar;let fr=(1+(p.level-1)*.012)*(1+activeLevel('fire')*.014)*(g.fr||1);let dmg=(1+(p.level-1)*.016)*(1+activeLevel('dmg')*.015)*(g.dmg||1);let pierceLuck=Math.min(.16,activeLevel('luck')*.004+(p.level-1)*.0008);let shield=shieldHitsFromLevel(activeLevel('shield'))+playerBaseShield(p.level);let power=Math.round(100+(p.level-1)*11+activeLevel('fire')*7+activeLevel('dmg')*8+activeLevel('shield')*5+activeLevel('luck')*4);return{level:p.level,cur:p.cur,need:p.need,pct:p.pct,fireRate:Math.round(fr*100),firePower:Math.round(dmg*100),luck:Math.round((.03+pierceLuck)*1000)/10,shield,power}}

function levelConfig(lv){
  let ci=Math.floor((lv-1)/5),boss=lv%5===0;
  // v21 length/gate pass: keep the v20 feel, but stretch maps another 15%.
  // More mob waves = more time to build and stack an army; gate caps climb faster toward the +75 final cap.
  let early=ci<3,ramp=ci>=3&&ci<5;
  let dur=(boss?64+Math.min(8,ci*1.0):47+Math.min(7,ci*.75))*1.725;
  let base=early?(boss?130:114)+lv*1.05+ci*7.5:ramp?(boss?124:98)+lv*1.18+ci*4.0:(boss?118:92)+lv*1.05+ci*3.2;
  let coreGoal=Math.ceil(Math.min(boss?340:285,base)*1.725);
  let bonusRatio=early?.27:ramp?.22:.18;
  let finalRatio=early?(boss?.36:.33):ramp?(boss?.37:.32):(boss?.35:.30);
  let bonusSmallGoal=Math.ceil(coreGoal*bonusRatio);
  let finalSmallGoal=Math.ceil(coreGoal*finalRatio);
  let hp=early?.50+ci*.07+lv*.010:ramp?.70+lv*.026:.92+lv*.038;
  let speed=early?86+ci*3+lv*.20:ramp?92+ci*4+lv*.34:98+ci*5+lv*.42;
  let spawn=early?(boss?.44:.36):ramp?(boss?.50:.44):(boss?.54:.50);
  return{lv,ci,boss,dur,coreGoal,bonusSmallGoal,finalSmallGoal,goal:coreGoal+bonusSmallGoal+finalSmallGoal,speed,spawn,hp,
    gateEvery:early?(boss?18.0:16.0):ramp?(boss?20.5:18.0):(boss?22.0:19.5),
    crystalEvery:early?(boss?11.5:10.5):ramp?(boss?12.8:11.8):(boss?14.0:12.8),
    lives:(early?5:4)+Math.floor(lv/8),miniAllowed:ci>=3,miniAt:ci===3?.76:ci===4?.66:.58,extraMiniChance:ci<3?0:ci<5?.06:ci<8?.14:.20,
    mobHpScale:early?.72:ramp?.88:1,miniHpScale:early?.36:ramp?.58:.72,bossHpScale:early?.68:ramp?.82:1,
    mobSpeedScale:early?.88:ramp?.95:1,miniSpeedScale:early?.82:ramp?.92:1,bossName:(chapters[ci]||chapters[chapters.length-1])[4]};
}

// ─── DRAW FUNCTIONS ───────────────────────────────────────────────────────────
// Draw background: chapter-based scenery with fresh cat-themed zones
function scenery(){return chapterScenery[clamp(run?run.L.ci:chapter,0,chapterScenery.length-1)]||chapterScenery[0]}
function drawBg(){
  let sc=scenery(),ro=run?run.road:0;
  // Clean chapter backdrop: distinctive, but calm. No tiled box-grid over the playfield.
  let sky=x.createLinearGradient(0,0,0,H*.46);
  sky.addColorStop(0,sc.sky[0]);sky.addColorStop(1,sc.sky[1]);
  x.fillStyle=sky;x.fillRect(0,0,W,H*.46);
  if(!PERF_MODE){drawBackPattern(sc,ro);drawAmbientScenery(sc,ro)}

  let floor=x.createLinearGradient(0,H*.38,0,H);
  floor.addColorStop(0,sc.floor[0]);floor.addColorStop(1,sc.floor[1]);
  x.fillStyle=floor;x.fillRect(0,H*.38,W,H);
  if(!PERF_MODE)drawFloorPattern(sc,ro);

  // Perspective road/path. Edges stay readable, scenery stays outside the lane.
  let top=W*.34,bottom=W*.90,yt=H*.12,yb=H;
  let grd=x.createLinearGradient(0,yt,0,yb);
  grd.addColorStop(0,sc.road[0]);grd.addColorStop(.35,sc.road[1]);grd.addColorStop(1,sc.road[2]);
  x.fillStyle=grd;x.beginPath();x.moveTo(W/2-top/2,yt);x.lineTo(W/2+top/2,yt);x.lineTo(W/2+bottom/2,yb);x.lineTo(W/2-bottom/2,yb);x.closePath();x.fill();
  x.strokeStyle=sc.edge;x.globalAlpha=.70;x.lineWidth=3;
  x.beginPath();x.moveTo(W/2-top/2,yt);x.lineTo(W/2-bottom/2,yb);x.stroke();
  x.beginPath();x.moveTo(W/2+top/2,yt);x.lineTo(W/2+bottom/2,yb);x.stroke();
  x.globalAlpha=1;

  if(!PERF_MODE){drawSideScenery(sc,ro);drawSceneSigns(sc,ro)}
  drawLaneDecals(sc,ro);
}
function sideRailX(y,side){
  let yt=H*.12,p=clamp((y-yt)/(H-yt),0,1),half=W*(.17+.28*p),pad=28+22*p;
  return clamp(W/2+side*(half+pad),W*.045,W*.955);
}
function drawSideScenery(sc,ro){
  let props=sc.props||[sc.propL,sc.propR],ci=run?run.L.ci:chapter;
  let spacing=Math.max(185,H*.27),cycle=H+spacing*2,stream=ro*.72+ci*113;
  x.save();
  for(let i=0;i<6;i++){
    let marker=stream+i*spacing,wrap=Math.floor(marker/cycle),y=(marker%cycle)-spacing*.70;
    if(y<H*.20||y>H*.98)continue;
    let side=((i+wrap+ci)%2)?1:-1;
    let kind=props[(i+ci*2)%props.length]||sc.propL;
    let depth=clamp((y-H*.18)/(H*.82),0,1),px=sideRailX(y,side);
    x.globalAlpha=.34+depth*.34;
    drawSceneProp(kind,px,y,side,sc,.42+depth*.34);
  }

}
function drawSceneCluster(sc,ro){drawSideScenery(sc,ro)}
function drawAmbientScenery(sc,ro){
  let back=sc.back||[],t=run?run.t:0;
  x.save();
  // Very soft, stationary chapter identity. Kept above the road and never as bright white panels.
  x.globalAlpha=.23;
  for(let i=0;i<Math.min(2,back.length);i++){

function drawSceneSigns(sc,ro){
  // One tiny side sign moving with the road, not fixed like an advert.
  let ci=run?run.L.ci:chapter,spacing=H+420,marker=ro*.66+ci*211+260;
  let wrap=Math.floor(marker/spacing),signY=(marker%spacing)-190;
  if(signY<H*.18||signY>H*.90)return;
  let side=((wrap+ci)%2)?1:-1,sx=sideRailX(signY,side),depth=clamp((signY-H*.18)/(H*.72),0,1),txt=sc.sign[(wrap+ci)%sc.sign.length]||'CAT ZONE';
  x.save();
  x.globalAlpha=.36+depth*.22;
  x.fillStyle='rgba(30,22,14,.46)';rr(sx-2,signY+20,4,36,3);x.fill();
  x.fillStyle=sc.signBg;rr(sx-31,signY,62,24,7);x.fill();
  x.strokeStyle=sc.signStroke;x.lineWidth=1.6;rr(sx-31,signY,62,24,7);x.stroke();
  x.fillStyle=sc.signStroke;x.font='900 8px system-ui';x.textAlign='center';
  x.fillText(txt.split(' ').slice(0,2).join(' '),sx,signY+12);
  x.font='9px system-ui';x.fillText('🐾',sx,signY+22);
  x.restore();
}

function drawMilkCarton(mx,my){
  x.save();x.translate(mx,my);
  // Carton body
  x.fillStyle='#f5f5f0';rr(-18,0,36,50,4);x.fill();
  x.strokeStyle='#ccc';x.lineWidth=1.5;rr(-18,0,36,50,4);x.stroke();
  // Blue stripe
  x.fillStyle='#3fa8ff';x.fillRect(-18,12,36,14);
  // MILK text
  x.fillStyle='white';x.font='bold 9px system-ui';x.textAlign='center';x.fillText('MILK',0,22);
  // Roof triangle
  x.fillStyle='#e8e8e0';x.beginPath();x.moveTo(-18,0);x.lineTo(0,-14);x.lineTo(18,0);x.closePath();x.fill();x.stroke();
  // Spill on floor
  x.fillStyle='rgba(255,255,255,.24)';x.beginPath();x.ellipse(10,50,24,6,0.3,0,Math.PI*2);x.fill();
  x.restore();
}

function drawCatBowl(bx,by){
  x.save();x.translate(bx,by);
  // Bowl
  x.fillStyle='#d94a20';x.beginPath();x.ellipse(0,10,28,12,0,0,Math.PI*2);x.fill();
  x.fillStyle='#c23a12';x.beginPath();x.arc(0,0,28,0,Math.PI);x.closePath();x.fill();
  x.strokeStyle='#8a1a04';x.lineWidth=2;x.beginPath();x.arc(0,0,28,0,Math.PI);x.stroke();
  // Bowl rim
  x.fillStyle='#e85530';x.beginPath();x.ellipse(0,0,28,9,0,0,Math.PI*2);x.fill();
  // Food inside
  x.fillStyle='#c87040';x.beginPath();x.ellipse(0,0,20,6,0,0,Math.PI*2);x.fill();
  // PAW label
  x.fillStyle='white';x.font='bold 8px system-ui';x.textAlign='center';x.fillText('PAW',0,2);
  x.restore();
}

// ─── DRAW CAT (hero) ─────────────────────────────────────────────────────────
function drawCat(cx,cy,bodyCol,headCol,accType,isLeader,size){
  let s=size||1;
  x.save();x.translate(cx,cy);x.scale(s,s);
  // Body
  x.fillStyle=bodyCol;rr(-7,-2,14,13,5);x.fill();
  // Tail
  x.strokeStyle=bodyCol;x.lineWidth=3.5;x.lineCap='round';
  x.beginPath();x.moveTo(7,8);x.bezierCurveTo(18,4,20,-8,14,-12);x.stroke();
  // Head
  x.fillStyle=headCol;x.beginPath();x.arc(0,-13,9,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(0,0,0,.15)';x.lineWidth=1;x.stroke();
  // Ears
  x.fillStyle=headCol;
  x.beginPath();x.moveTo(-7,-19);x.lineTo(-12,-27);x.lineTo(-2,-20);x.closePath();x.fill();
  x.beginPath();x.moveTo(7,-19);x.lineTo(12,-27);x.lineTo(2,-20);x.closePath();x.fill();
  // Inner ear pink
  x.fillStyle='rgba(255,160,180,.7)';
  x.beginPath();x.moveTo(-7,-20);x.lineTo(-10,-25);x.lineTo(-4,-20);x.closePath();x.fill();
  x.beginPath();x.moveTo(7,-20);x.lineTo(10,-25);x.lineTo(4,-20);x.closePath();x.fill();
  // Eyes
  x.fillStyle='#fff';
  x.beginPath();x.ellipse(-3.5,-14,2.8,2.8,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(3.5,-14,2.8,2.8,0,0,Math.PI*2);x.fill();
  // Pupils
  x.fillStyle='#1a0a00';
  x.beginPath();x.ellipse(-3.5,-14,1.5,1.8,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(3.5,-14,1.5,1.8,0,0,Math.PI*2);x.fill();
  // Eye shine
  x.fillStyle='rgba(255,255,255,.9)';
  x.beginPath();x.arc(-2.5,-13.5,.9,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(4.5,-13.5,.9,0,Math.PI*2);x.fill();
  // Nose
  x.fillStyle='#e87090';x.beginPath();x.ellipse(0,-10.5,1.6,1.2,0,0,Math.PI*2);x.fill();
  // Mouth
  x.strokeStyle='rgba(0,0,0,.5)';x.lineWidth=1;x.beginPath();x.moveTo(0,-9.5);x.lineTo(-2,-7.5);x.moveTo(0,-9.5);x.lineTo(2,-7.5);x.stroke();
  // Whiskers
  x.strokeStyle='rgba(255,255,255,.85)';x.lineWidth=.9;
  x.beginPath();x.moveTo(-2,-10);x.lineTo(-11,-8.5);x.stroke();
  x.beginPath();x.moveTo(-2,-10);x.lineTo(-11,-11.5);x.stroke();
  x.beginPath();x.moveTo(2,-10);x.lineTo(11,-8.5);x.stroke();
  x.beginPath();x.moveTo(2,-10);x.lineTo(11,-11.5);x.stroke();
  // Paws
  x.fillStyle=bodyCol;
  x.beginPath();x.ellipse(-5,11,3,2,-.2,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(5,11,3,2,.2,0,Math.PI*2);x.fill();
  // Accessory
  if(accType==='crown'||isLeader){
    x.fillStyle='#ffd700';
    x.beginPath();x.moveTo(-7,-22);x.lineTo(-5,-30);x.lineTo(-1,-24);x.lineTo(0,-32);x.lineTo(1,-24);x.lineTo(5,-30);x.lineTo(7,-22);x.closePath();x.fill();
    x.strokeStyle='#c8a000';x.lineWidth=1;x.stroke();
    x.fillStyle='#ff4444';x.beginPath();x.arc(0,-31,1.8,0,Math.PI*2);x.fill();
  } else if(accType==='bandana'){
    x.fillStyle='#ff4444';rr(-6,-5,12,4,2);x.fill();
    x.strokeStyle='#cc0000';x.lineWidth=1;rr(-6,-5,12,4,2);x.stroke();
  } else if(accType==='cape'){
    x.fillStyle='#6600cc';x.beginPath();x.moveTo(-7,0);x.lineTo(-10,12);x.lineTo(10,12);x.lineTo(7,0);x.fill();
    x.fillStyle='#ff0';x.beginPath();x.arc(0,2,1.5,0,Math.PI*2);x.fill();
  } else if(accType==='helm'){
    x.fillStyle='#888ea8';rr(-9,-24,18,12,6);x.fill();
    x.strokeStyle='#6a7080';x.lineWidth=1.5;rr(-9,-24,18,12,6);x.stroke();
  }
  x.restore();
}

// ─── DRAW SQUAD ──────────────────────────────────────────────────────────────
function drawSquad(){
  let p=run.player,sk=skins[shop.skin]||skins.blue;
  let n=Math.min(p.squad,28),cols=Math.min(7,n);
  for(let i=n-1;i>=0;i--){
    let row=(i/cols)|0,col=i%cols;
    let cx=p.x+(col-(cols-1)/2)*14,cy=p.y+row*13;
    let isLead=i===0;
    drawCat(cx,cy,sk.body,sk.head,isLead?(sk.acc||'crown'):sk.acc,isLead,.9);
  }
  if(p.squad>n){
    x.fillStyle='rgba(50,20,5,.65)';rr(p.x+38,p.y-46,65,26,13);x.fill();
    x.fillStyle='#ffe97a';x.font='900 13px system-ui';x.textAlign='center';
    x.fillText('+'+(p.squad-n),p.x+70,p.y-29);
  }
}

          kind==='sugarDoberman'?'#ff8eea':
          kind==='roninShiba'?'#b65b34':
          kind==='lavaHoundKing'?'#b62a18':
          kind==='rottweiler'?'#2a1808':
          kind==='sewerDog'?'#6a7040':
          isDog?'#b07848':
          isRaccoon?'#7a7a8a':
          isRat?'#7a6a6a':
          isBird?'#8898a8':
          isRobot?'#c8c8c8':'#7a7a8a';
  if(isRobot){drawRobotVacuum(r)}
  else if(isBird){drawPigeon(r)}
  else if(isRaccoon){drawRaccoon(r)}
  else if(isRat){drawRat(r)}
  else{drawDogFace(r,col,kind)}
  // Boss accessories
  if(m.boss){
    if(kind==='kingChihuahua'||kind==='dogEmperorRex'||kind==='ratEmperor'||kind==='royalPoodle'||kind==='cerberus'){
      // Crown
      x.fillStyle='#ffd700';
      x.beginPath();x.moveTo(-r*.6,-r-4);x.lineTo(-r*.4,-r-20);x.lineTo(-r*.1,-r-10);x.lineTo(0,-r-24);x.lineTo(r*.1,-r-10);x.lineTo(r*.4,-r-20);x.lineTo(r*.6,-r-4);x.closePath();x.fill();
      x.strokeStyle='#c8a000';x.lineWidth=1.5;x.stroke();
      x.fillStyle='#ff2244';x.beginPath();x.arc(0,-r-23,3,0,Math.PI*2);x.fill();
    }
    if(kind==='cerberus'){
      // Extra 2 heads hinted
      x.fillStyle='rgba(42,20,8,.7)';
      x.beginPath();x.arc(-r*1.3,-r*.3,r*.5,0,Math.PI*2);x.fill();
      x.beginPath();x.arc(r*1.3,-r*.3,r*.5,0,Math.PI*2);x.fill();
      x.fillStyle='#fff';x.beginPath();x.arc(-r*1.2,-r*.38,r*.14,0,Math.PI*2);x.fill();x.beginPath();x.arc(r*1.4,-r*.38,r*.14,0,Math.PI*2);x.fill();
      x.fillStyle='#ff2200';x.beginPath();x.arc(-r*1.2,-r*.38,r*.07,0,Math.PI*2);x.fill();x.beginPath();x.arc(r*1.4,-r*.38,r*.07,0,Math.PI*2);x.fill();
    }
    if(kind==='mailman'){
      // Mailman hat
      x.fillStyle='#2244cc';rr(-r*.7,-r-16,r*1.4,12,4);x.fill();
      x.fillStyle='#1a3399';rr(-r*.9,-r-6,r*1.8,6,3);x.fill();
      x.fillStyle='#ffff00';x.font='bold 8px system-ui';x.textAlign='center';x.fillText('MAIL',0,-r-7);
    }
    if(kind==='vacuum9000'){
      // Upgrade - glowing red eye
      x.fillStyle='rgba(255,50,0,.5)';x.beginPath();x.arc(0,0,r*1.3,0,Math.PI*2);x.fill();
      x.font='bold 9px system-ui';x.textAlign='center';x.fillStyle='#ff8888';x.fillText('9000',0,r+14);
    }
    // Boss name label
    x.fillStyle='rgba(50,10,0,.7)';rr(-r-10,-r-46,r*2+20,18,8);x.fill();
    x.fillStyle='#ffe97a';x.font='bold 11px system-ui';x.textAlign='center';
    x.strokeStyle='rgba(0,0,0,.8)';x.lineWidth=3;
    x.strokeText(mobName(kind),0,-r-32);x.fillText(mobName(kind),0,-r-32);
  }
  // HP bar
  x.fillStyle='rgba(0,0,0,.55)';rr(-r,-r-16,r*2,6,3);x.fill();
  x.fillStyle=m.hp/m.max<.35?'#ff315d':'#75ff6f';rr(-r,-r-16,r*2*clamp(m.hp/m.max,0,1),6,3);x.fill();
  x.restore();
}

// ─── DRAW GATE ───────────────────────────────────────────────────────────────
function drawGate(g){
  let powerGate=g.type==='power';
  let positive=powerGate?true:(g.type==='add'||g.type==='minus')?Math.round(g.val)>=0:['add','mult'].includes(g.type);
  let bad=g.type==='slow'||g.type==='weak'||g.type==='half';
  if(bad)positive=false;
  x.save();x.translate(g.x,g.y);
  let sc=1+(g.pulse||0)*2;x.scale(sc,sc);
  // Gate card background
  let bg=x.createLinearGradient(-g.w/2,-g.h/2,g.w/2,g.h/2);
  if(powerGate){bg.addColorStop(0,g.power==='bomb'?'#ffd56a':'#a8fbff');bg.addColorStop(.5,g.power==='bomb'?'#ff9b3d':'#66dfff');bg.addColorStop(1,g.power==='bomb'?'#e85b20':'#5f7cff')}
  else if(positive){bg.addColorStop(0,'#c0f0ff');bg.addColorStop(.5,'#a0d8ff');bg.addColorStop(1,'#80b8ff')}
  else{bg.addColorStop(0,'#ff9090');bg.addColorStop(.5,'#ff6060');bg.addColorStop(1,'#cc3030')}
  x.fillStyle=bg;rr(-g.w/2,-g.h/2,g.w,g.h,18);x.fill();
  // Border glow
  x.strokeStyle=powerGate?(g.power==='bomb'?'#ffdf6a':'#76f7ff'):(positive?'#4ae0ff':'#ff2244');
  x.lineWidth=4;
  rr(-g.w/2,-g.h/2,g.w,g.h,18);x.stroke();
  // Inner glow ring
  x.strokeStyle=powerGate?'rgba(255,255,255,.65)':(positive?'rgba(180,250,255,.5)':'rgba(255,180,180,.5)');
  x.lineWidth=2;
  rr(-g.w/2+5,-g.h/2+5,g.w-10,g.h-10,13);x.stroke();
  // Main label
  let lab=powerGate?(g.power==='bomb'?'BOMB':'2x'):(g.type==='add'||g.type==='minus')?(Math.round(g.val)>=0?'+'+Math.round(g.val):String(Math.round(g.val))):
           g.type==='half'?'÷2':g.type==='slow'?'NAP':g.type==='weak'?'CLAW':'x'+g.val.toFixed(1);
  x.textAlign='center';
  x.font='900 '+(lab.length>5?20:28)+'px system-ui';
  x.strokeStyle='rgba(0,0,0,.5)';x.lineWidth=5;x.strokeText(lab,0,-10);
  x.fillStyle=powerGate?'#ffffff':positive?'#003366':'#ffffff';x.fillText(lab,0,-10);
  // Sub label
  let sub=powerGate?'BULLET GATE':positive?(g.type==='mult'?'x CATS':(g.type==='add'||g.type==='minus')?'+CATS':'ADOPT'):
          g.type==='half'?'÷ CATS':g.type==='slow'?'x0.65 FIRE':'WEAK';
  x.font='bold 10px system-ui';
  x.fillStyle=powerGate?'rgba(255,255,255,.92)':positive?'rgba(0,50,100,.8)':'rgba(255,230,230,.9)';
  x.strokeStyle='rgba(0,0,0,.4)';x.lineWidth=3;
  x.strokeText(sub,0,12);x.fillText(sub,0,12);
  // Icon
  if(powerGate){x.font='16px system-ui';x.fillText(g.power==='bomb'?'💥':'✨',0,35)}
  else if(positive&&(g.type==='add'||g.type==='mult')){x.font='16px system-ui';x.fillText(g.finalBoost?'👑':'🐟',0,35)}
  else if(!positive){x.font='16px system-ui';x.fillText('🐕',0,35)}
  x.restore();
}
// ─── DRAW CRYSTAL/TREASURE ───────────────────────────────────────────────────
function drawCrystal(o){
  x.save();x.translate(o.x,o.y);
  let col=o.kind==='coin'?'#ffe15e':crystalColor(o.power||'pierce');
  // Glow
  x.fillStyle=col.replace(')',', .18)').replace('rgb','rgba').replace('#','rgba(').replace(/rgba\(([0-9a-f]{6}), .18\)/i,()=>{
    let h=col.slice(1);
    let r=parseInt(h.slice(0,2),16),g2=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    return `rgba(${r},${g2},${b},0.22)`;
  });
  x.beginPath();x.arc(0,0,o.rad+10,0,Math.PI*2);x.fill();
  // Card body
  if(o.kind==='coin'){
    // Fish shaped
    x.fillStyle='#ffe87a';rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.5);x.fill();
    x.strokeStyle='#c8a000';x.lineWidth=3;rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.5);x.stroke();
    x.font='22px system-ui';x.textAlign='center';x.fillText('🐟',0,8);
  } else {
    x.fillStyle='rgba(30,20,40,.8)';rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.4);x.fill();
    x.strokeStyle=col;x.lineWidth=3;rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.4);x.stroke();
    // Crystal gem
    x.fillStyle=col;
    x.beginPath();x.moveTo(0,-o.rad*.6);x.lineTo(o.rad*.5,0);x.lineTo(0,o.rad*.6);x.lineTo(-o.rad*.5,0);x.closePath();x.fill();
    x.fillStyle='rgba(255,255,255,.4)';
    x.beginPath();x.moveTo(0,-o.rad*.6);x.lineTo(o.rad*.5,0);x.lineTo(0,0);x.closePath();x.fill();
  }
  // Label
  let cl=o.kind==='coin'?'FISH':crystalLabel(o.power||'pierce');
  x.font='bold 9px system-ui';x.textAlign='center';
  x.strokeStyle='rgba(0,0,0,.8)';x.lineWidth=3;x.strokeText(cl,0,o.rad+3);
  x.fillStyle='#fff';x.fillText(cl,0,o.rad+3);
  // HP bar
  x.fillStyle='rgba(0,0,0,.5)';rr(-o.rad,-o.rad-14,o.rad*2,5,3);x.fill();
  x.fillStyle='#72ff7a';rr(-o.rad,-o.rad-14,o.rad*2*clamp(o.hp/o.max,0,1),5,3);x.fill();
  x.restore();
}

// ─── DRAW BULLETS ────────────────────────────────────────────────────────────
function drawBullet(b){
  let bc=(bullets[shop.bullet]||bullets.yellow).col;
  let col=b.bomb?'#ffb13d':b.double?'#4dffff':b.pierce?'#e98cff':bc;
  x.fillStyle=col;
  let radius=(b.bomb?5:b.pierce?4:3)*(b.size||1);
  if(b.bomb){
    x.beginPath();x.arc(b.x,b.y,radius,0,Math.PI*2);x.fill();
    x.strokeStyle='rgba(255,235,100,.75)';x.lineWidth=2;
    x.beginPath();x.arc(b.x,b.y,radius+4,0,Math.PI*2);x.stroke();
  } else if(shop.bullet==='yellow'){
    x.beginPath();x.arc(b.x,b.y,radius,0,Math.PI*2);x.fill();
    x.strokeStyle=b.double?'rgba(120,255,255,.78)':'rgba(255,255,145,.68)';x.lineWidth=1;
    x.beginPath();x.arc(b.x,b.y,radius,0,Math.PI*2);x.stroke();
  } else {
    x.beginPath();x.ellipse(b.x,b.y,radius,(b.pierce?12:9)*(b.size||1),0,0,Math.PI*2);x.fill();
  }
}
// ─── MAIN DRAW ───────────────────────────────────────────────────────────────
function draw(){
  x.setTransform(DPR,0,0,DPR,0,0);
  drawBg();
  if(run){
    x.save();
    if(shake>0){x.translate(rnd(-shake*16,shake*16),rnd(-shake*16,shake*16));shake*=.88}
    run.gates.forEach(drawGate);
    run.crys.forEach(drawCrystal);
    run.mobs.forEach(drawMob);
    run.bul.forEach(drawBullet);
    drawSquad();
    run.fx.forEach(f=>{x.globalAlpha=clamp(f.t*2,0,1);x.fillStyle=f.c;x.beginPath();x.arc(f.x,f.y,f.r,0,Math.PI*2);x.fill();x.globalAlpha=1});
    run.texts.forEach(t=>{
      x.globalAlpha=clamp(t.t*1.5,0,1);
      x.font='900 20px system-ui';x.textAlign='center';
      x.strokeStyle='rgba(0,0,0,.8)';x.lineWidth=5;x.strokeText(t.s,t.x,t.y);
      x.fillStyle=t.c;x.fillText(t.s,t.x,t.y);
      x.globalAlpha=1;
    });
    x.restore();
  }
  if(msgT>0){msgT-=.016;if(msgT<=0)toast.classList.add('hidden')}
}

function loop(ts){
  let dt=Math.min(.033,(ts-last)/1000||.016);last=ts;
  if(document.hidden){requestAnimationFrame(loop);return}
  if(state==='play'){update(dt);draw()}
  else if(msgT>0){msgT-=dt;if(msgT<=0)toast.classList.add('hidden')}
  requestAnimationFrame(loop);
}


function showIntro(){
  goMeta();run=null;setCardMode('introScreen');
  card.innerHTML=`<div class="pawTrail p1">🐾</div><div class="pawTrail p2">🐾</div><div class="pawTrail p3">🐾</div><div class="pawTrail p4">🐾</div><div class="pawTrail p5">🐾</div><div class="pawTrail p6">🐾</div><div class="introLogo"><div class="introKicker">Cat army adventure</div><div class="introTitle">Paws<br>&amp; Claws</div><div class="introSub">🐾 Loading the roadmap...</div></div>`;
  overlay.classList.remove('hidden');
  setTimeout(()=>{if(state==='menu'&&card.classList.contains('introScreen'))htmlHome()},2650);
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
pauseBtn.addEventListener('click',pauseGame);
c.addEventListener('pointerdown',e=>{if(!run||state!=='play')return;drag=true;startX=e.clientX;startPX=run.player.tx});
c.addEventListener('pointermove',e=>{if(!drag||!run)return;run.player.tx=clamp(startPX+(e.clientX-startX)*1.08,W*.15,W*.85)});
addEventListener('pointerup',()=>drag=false);
addEventListener('pointercancel',()=>drag=false);

showIntro();
requestAnimationFrame(loop);
})();
</script></body></html>
