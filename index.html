// ─── UI HTML ────────────────────────────────────────────────────────────────
function htmlHome(){
  const ch=clamp(Math.floor((unlocked-1)/5),0,chapters.length-1);
  const cp=chapters[ch]||chapters[chapters.length-1];
  card.innerHTML=`
    <div style="background:linear-gradient(180deg,#f9c98a,#e8a050);border-radius:20px;padding:14px 10px 10px;margin-bottom:14px;border:2px solid rgba(255,255,255,.3)">
      <div style="font-size:13px;font-weight:900;color:#a04010;letter-spacing:2px">🐾 &nbsp; PAWS &amp; CLAWS &nbsp; 🐾</div>
      <div style="font-size:34px;font-weight:1000;color:#5a1e06;text-shadow:0 3px 0 #ffd080,0 6px 14px rgba(80,20,0,.3);letter-spacing:-1px;margin:2px 0">Paws &amp; Claws</div>
      <div style="font-size:13px;color:#7a3810;font-weight:700">Vrolijk, kleurrijk en super schattig 🐱</div>
    </div>
    <div class=chapter><b>${cp[1]} Chapter ${ch+1}: ${cp[0]}</b><br><span class=tiny>Niveau ${unlocked}/${TOTAL} · Boss: ${cp[4]}</span></div>
    <button class="btn gold" id=play>▶ SPEEL NU</button>
    <button class="btn blue" id=chap>🗺 Chapters</button>
    <button class="btn blue" id=upg>🐟 Upgrades</button>
    <button class="btn blue" id=sshop>🛍 Shop</button>
    <button class="btn dim" id=reset>Reset save</button>
    <p class=tiny>Fish: ${fish} 🐟 · ${guns[shop.gun].n} · ${skins[shop.skin].n}</p>`;
  overlay.classList.remove('hidden');
  document.getElementById('play').onclick=()=>startLevel(clamp(unlocked,1,TOTAL));
  document.getElementById('chap').onclick=htmlChapters;
  document.getElementById('upg').onclick=htmlUpgrades;
  document.getElementById('sshop').onclick=htmlShop;
  document.getElementById('reset').onclick=htmlReset;
}
function htmlChapters(){
  let out='<div class=logo>🗺️</div><h1>Cat Territories</h1>';
  for(let ci=0;ci<chapters.length;ci++){
    let cp=chapters[ci];
    out+=`<div class=chapter><b>${cp[1]} ${cp[0]}</b><br><span class=tiny>Boss: ${cp[4]}</span><div class=lvlrow>`;
    for(let i=1;i<=5;i++){let lv=ci*5+i,cls=lv<unlocked?'done':lv>unlocked?'lock':'';out+=`<button class="lvl ${cls}" data-lv=${lv} ${lv>unlocked?'disabled':''}>${lv<unlocked?'✓':''}${lv}</button>`}
    out+='</div></div>'
  }
  out+='<button class="btn dim" id=back>← Terug</button>';
  card.innerHTML=out;
  document.getElementById('back').onclick=htmlHome;
  card.querySelectorAll('[data-lv]').forEach(b=>b.onclick=()=>startLevel(+b.dataset.lv));
}
function htmlUpgrades(){
  function cost(k){return[140,210,310,450,640,880,1180,1550][ups[k]]||2100}
  card.innerHTML=`<div class=logo>🧶</div><h1>Cat Upgrades</h1><p class=muted>🐟 Fish: <b>${fish}</b></p><div class=upgrade>${[['fire','🌿 Whisker Speed'],['dmg','🐟 Tuna Damage'],['gates','🐾 Better Shelters']].map(([k,n])=>`<button class=up data-up=${k}>${n}<br><span class=tiny>Lvl ${ups[k]} · ${cost(k)} fish</span></button>`).join('')}</div><button class="btn dim" id=back>← Terug</button>`;
  document.getElementById('back').onclick=htmlHome;
  card.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>{let k=b.dataset.up,co=cost(k);if(fish>=co){fish-=co;ups[k]++;save();htmlUpgrades()}else pop('Te weinig fish! 🐟')});
}
function htmlShop(){
  let tab='guns';
  function row(type,key,it,owned,equipped){
    let can=fish>=it.cost;

      if(g.type==='add'){let vv=clamp(Math.round(g.val),1,g.maxVal||25);p.squad+=vv;addText('+'+vv,g.x,g.y,'#66ff8b')}
      if(g.type==='minus'){let vv=Math.round(g.val);p.squad+=vv;addText(vv>=0?'+'+vv:String(vv),g.x,g.y,vv>=0?'#66ff8b':'#ff4267')}
      if(g.type==='half'){p.squad=Math.ceil(p.squad/2);addText('÷2',g.x,g.y,'#ff4267')}
      if(g.type==='slow'){p.fr*=g.val;addText('FIRE x'+g.val,g.x,g.y,'#ff4267')}
      if(g.type==='weak'){p.dmg*=g.val;addText('DMG x'+g.val,g.x,g.y,'#ff4267')}
      if(g.type==='mult'){p.squad=Math.ceil(p.squad*clamp(g.val,1.02,1.16));addText('x'+clamp(g.val,1.02,1.16).toFixed(1),g.x,g.y,'#66ff8b')}
      addFx(g.x,g.y,((g.type==='add'||g.type==='mult')||(g.type==='minus'&&Math.round(g.val)>=0))?'#66ff8b':'#ff4267',18);
      if(p.squad<1){fail();return}
    }
    if(g.y>H+80)r.gates.splice(i,1);
  }
  for(let i=r.crys.length-1;i>=0;i--){let o=r.crys[i];o.y+=L.speed*.9*dt;if(o.hit>0)o.hit-=dt;if(o.y>H+80)r.crys.splice(i,1)}
  for(let i=r.mobs.length-1;i>=0;i--){
    let m=r.mobs[i];m.wob+=dt*5;if(m.hit>0)m.hit-=dt;
    if(m.boss){m.shieldCd-=dt;if(m.shieldCd<=0){m.shield=Math.max(m.shield,m.max*.10);m.shieldCd=rnd(6.5,9.5);pop('Boss shield! 🛡')}m.burrowCd-=dt;if(m.burrowCd<=0){m.burrow=.85;m.burrowCd=rnd(7,10);pop('Dodge! 💨')}if(m.burrow>0){m.burrow-=dt;m.y-=18*dt}}
    if(m.spawnCd!==undefined){m.spawnCd-=dt;if(m.spawnCd<=0&&r.spawned<r.L.goal-1){if(m.kind==='kingChihuahua'||m.kind==='dogTrainer'){spawnMob('rat');spawnMob('pigeon');pop('Pest swarm!')}else if(m.kind==='bulldogChef'){spawnMob('mopDog');pop('Kitchen mess!')}else if(m.kind==='ratEmperor'){spawnMob('rat');pop('Rat pack!')}else if(m.kind==='alphaPitbull'){spawnMob('puppy');spawnMob('bulldog');pop('Kennel rush!')}else if(m.kind==='mailman'){spawnMob('doberman');pop('Delivery dogs!')}else if(m.kind==='royalPoodle'){spawnMob('poodle');spawnMob('drone');pop('Fancy backup!')}else if(m.kind==='dogEmperorRex'){spawnMob('rottweiler');spawnMob('bulldog');pop('Royal guards!')}else if(m.kind==='cerberus'){spawnMob('bulldog');spawnMob('doberman');pop('Three heads!')}else if(m.kind==='omegaDogGate'){spawnMob('rottweiler');spawnMob('drone');spawnMob('dogCatcher');pop('Beware!')}m.spawnCd=m.boss?4.8:5.5}}
    if((m.kind==='raccoonKing'||m.kind==='krakenCollar'||m.kind==='crowBaron')&&m.y>H*.20&&Math.random()<dt*.45){m.x=clamp(m.x+rnd(-90,90),W*.22,W*.78);addFx(m.x,m.y,'#ffd45e',10)}
    let stop=p.y-60-Math.min(70,p.squad*.45)-(m.boss?40:0);
    if(m.y<stop)m.y+=m.vy*dt;
    else{m.lock=true;m.x+=(p.x-m.x)*dt*2.1;m.atk-=dt;if(m.atk<=0){let loss=m.boss?(m.kind==='vacuum9000'?4:3):m.mini?2:1;p.squad-=loss;addText('-'+loss,m.x,m.y,'#ff4267');addFx(p.x,p.y-40,'#ff4267',10);m.atk=(m.boss?1.05:.78)+rnd(0,.25);if(p.squad<1){fail();return}}}
    if(m.hp<=0){r.kills++;r.fishGot+=m.boss?35:m.mini?12:1;r.mobs.splice(i,1)}
  }
  for(let i=r.fx.length-1;i>=0;i--){let f=r.fx[i];f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=240*dt;f.t-=dt;if(f.t<=0)r.fx.splice(i,1)}
  for(let i=r.texts.length-1;i>=0;i--){let t=r.texts[i];t.y-=40*dt;t.t-=dt;if(t.t<=0)r.texts.splice(i,1)}
  if(r.spawned>=L.goal&&r.kills>=r.spawned&&r.mobs.length===0)complete();
  updateHud();
}

// ─── DRAW FUNCTIONS ───────────────────────────────────────────────────────────
// Draw background: chapter-based scenery with fresh cat-themed zones
function scenery(){return chapterScenery[clamp(run?run.L.ci:chapter,0,chapterScenery.length-1)]||chapterScenery[0]}
function drawBg(){
  let sc=scenery(),ro=run?run.road:0;
  // Clean chapter backdrop: distinctive, but calm. No tiled box-grid over the playfield.
  let sky=x.createLinearGradient(0,0,0,H*.46);
  sky.addColorStop(0,sc.sky[0]);sky.addColorStop(1,sc.sky[1]);
  x.fillStyle=sky;x.fillRect(0,0,W,H*.46);
  drawBackPattern(sc,ro);
  drawAmbientScenery(sc,ro);

  let floor=x.createLinearGradient(0,H*.38,0,H);
  floor.addColorStop(0,sc.floor[0]);floor.addColorStop(1,sc.floor[1]);
  x.fillStyle=floor;x.fillRect(0,H*.38,W,H);
  drawFloorPattern(sc,ro);

  // Perspective road/path. Edges stay readable, scenery stays outside the lane.
  let top=W*.34,bottom=W*.90,yt=H*.12,yb=H;
  let grd=x.createLinearGradient(0,yt,0,yb);
  grd.addColorStop(0,sc.road[0]);grd.addColorStop(.35,sc.road[1]);grd.addColorStop(1,sc.road[2]);
  x.fillStyle=grd;x.beginPath();x.moveTo(W/2-top/2,yt);x.lineTo(W/2+top/2,yt);x.lineTo(W/2+bottom/2,yb);x.lineTo(W/2-bottom/2,yb);x.closePath();x.fill();
  x.strokeStyle=sc.edge;x.globalAlpha=.70;x.lineWidth=3;
  x.beginPath();x.moveTo(W/2-top/2,yt);x.lineTo(W/2-bottom/2,yb);x.stroke();
  x.beginPath();x.moveTo(W/2+top/2,yt);x.lineTo(W/2+bottom/2,yb);x.stroke();
  x.globalAlpha=1;

  drawSideScenery(sc,ro);
  drawSceneSigns(sc,ro);
  drawLaneDecals(sc,ro);
}
function sideRailX(y,side){
  let yt=H*.12,p=clamp((y-yt)/(H-yt),0,1),half=W*(.17+.28*p),pad=28+22*p;
  return clamp(W/2+side*(half+pad),W*.045,W*.955);
}
function drawSideScenery(sc,ro){
  let props=sc.props||[sc.propL,sc.propR],ci=run?run.L.ci:chapter;
  let spacing=Math.max(185,H*.27),cycle=H+spacing*2,stream=ro*.72+ci*113;
  x.save();
  for(let i=0;i<6;i++){
    let marker=stream+i*spacing,wrap=Math.floor(marker/cycle),y=(marker%cycle)-spacing*.70;
    if(y<H*.20||y>H*.98)continue;
    let side=((i+wrap+ci)%2)?1:-1;
    let kind=props[(i+ci*2)%props.length]||sc.propL;
    let depth=clamp((y-H*.18)/(H*.82),0,1),px=sideRailX(y,side);
    x.globalAlpha=.34+depth*.34;
    drawSceneProp(kind,px,y,side,sc,.42+depth*.34);
  }
  x.restore();
}
function drawSceneCluster(sc,ro){drawSideScenery(sc,ro)}
function drawAmbientScenery(sc,ro){
  let back=sc.back||[],t=run?run.t:0;
  x.save();
  // Very soft, stationary chapter identity. Kept above the road and never as bright white panels.
  x.globalAlpha=.23;
  for(let i=0;i<Math.min(2,back.length);i++){
    let px=W*(.28+i*.44),py=H*(.145+.04*(i%2));
    drawBackgroundMotif(back[i],px,py,sc,ro,t);
  }
  if(back.length>2){x.globalAlpha=.14;drawBackgroundMotif(back[2],W*.50,H*.27,sc,ro,t)}
  x.restore();
}
function drawLaneDecals(sc,ro){
  if(!run)return;
  x.save();x.globalAlpha=.075;x.fillStyle=sc.edge;
  for(let i=0;i<7;i++){
    let y=H*.48+((i*137+ro*.19)%(H*.46)),side=(i%2)?1:-1,px=sideRailX(y,side)-side*(20+((i*11)%18));
    sc.decal==='fish'?drawFishBone(px,y,7):drawPawPrint(px,y,7);
  }
  x.restore();
}
function drawForegroundScenery(sc,ro){}
function drawBackPattern(sc,ro){
  x.save();
  // Background texture only: no visible square tile grid.
  if(sc.grid==='stars'){
    x.fillStyle='rgba(255,255,255,.42)';
    for(let i=0;i<34;i++){let sx=(i*91+ro*.018)%W,sy=(i*47)%(H*.40);x.globalAlpha=.10+(i%4)*.025;x.beginPath();x.arc(sx,sy,1+(i%2),0,Math.PI*2);x.fill()}
  } else if(sc.grid==='circuit'){
    x.strokeStyle='rgba(180,245,255,.10)';x.lineWidth=2;
    for(let i=0;i<6;i++){let y=i*H*.065+18;x.beginPath();x.moveTo(0,y);x.lineTo(W,y+((i%2)?14:-9));x.stroke()}
    x.fillStyle='rgba(180,245,255,.12)';for(let i=0;i<10;i++){x.beginPath();x.arc((i*97+ro*.02)%W,(i*41)%(H*.36),2.5,0,Math.PI*2);x.fill()}
  } else if(sc.grid==='grass'){
    x.strokeStyle='rgba(255,255,255,.11)';x.lineWidth=2;
    for(let i=0;i<12;i++){let gx=(i*83+ro*.025)%W,wig=Math.sin(i*2.31+ro*.01)*8;x.beginPath();x.moveTo(gx,H*.43);x.lineTo(gx+wig,H*.39-((i*11)%17));x.stroke()}
  } else if(sc.grid==='water'){
    x.strokeStyle='rgba(220,255,255,.10)';x.lineWidth=2;
    for(let ty=H*.12+(ro*.018%70);ty<H*.42;ty+=72){x.beginPath();x.moveTo(0,ty);for(let xx=0;xx<W;xx+=54)x.quadraticCurveTo(xx+27,ty+7,xx+54,ty);x.stroke()}
  } else {
    // Soft wall bands instead of square cells.
    let band=x.createLinearGradient(0,0,0,H*.45);
    band.addColorStop(0,'rgba(255,255,255,.055)');band.addColorStop(.55,'rgba(255,255,255,.025)');band.addColorStop(1,'rgba(0,0,0,.035)');
    x.fillStyle=band;x.fillRect(0,0,W,H*.45);
    x.strokeStyle='rgba(255,255,255,.045)';x.lineWidth=2;
    for(let i=0;i<3;i++){let y=H*(.16+i*.09);x.beginPath();x.moveTo(W*.08,y);x.lineTo(W*.92,y+Math.sin(i+ro*.002)*8);x.stroke()}
  }
  x.globalAlpha=1;
  x.restore();
}
function drawFloorPattern(sc,ro){
  x.save();
  // Smooth ground texture: no rectangular paver/tile boxes in the playfield.
  let veil=x.createLinearGradient(0,H*.38,0,H);
  veil.addColorStop(0,'rgba(255,255,255,.035)');veil.addColorStop(.55,'rgba(0,0,0,.015)');veil.addColorStop(1,'rgba(0,0,0,.105)');
  x.fillStyle=veil;x.fillRect(0,H*.38,W,H*.62);
  if(sc.grid==='grass'){
    x.strokeStyle='rgba(20,80,20,.13)';x.lineWidth=2;
    for(let i=0;i<22;i++){let gx=(i*67+ro*.11)%W,gy=H*.42+((i*73+ro*.17)%(H*.54));let lean=Math.sin(i*1.7)*3;x.beginPath();x.moveTo(gx,gy);x.lineTo(gx+lean,gy-8);x.stroke()}
  } else if(sc.grid==='water'){
    x.strokeStyle='rgba(200,250,255,.14)';x.lineWidth=2;
    for(let ty=H*.42+(ro*.08%68);ty<H;ty+=72){x.beginPath();x.moveTo(0,ty);for(let xx=0;xx<W;xx+=48)x.quadraticCurveTo(xx+24,ty+7,xx+48,ty);x.stroke()}
  } else if(sc.grid==='warning'||sc.grid==='stripe'){
    x.strokeStyle='rgba(255,230,90,.13)';x.lineWidth=7;
    for(let i=-W;i<W*2;i+=110){x.beginPath();x.moveTo(i+ro*.16,H);x.lineTo(i+W*.28+ro*.16,H*.40);x.stroke()}
  } else if(sc.grid==='sewer'){
    x.strokeStyle='rgba(120,255,120,.09)';x.lineWidth=3;
    for(let ty=H*.44+(ro*.06%86);ty<H;ty+=96){x.beginPath();x.moveTo(W*.08,ty);x.lineTo(W*.92,ty+Math.sin(ty*.01)*5);x.stroke()}
  } else {
    // Subtle perspective streaks instead of grid boxes.
    x.strokeStyle='rgba(255,255,255,.055)';x.lineWidth=2;
    for(let i=-2;i<=2;i++){
      let sx=W/2+i*W*.12,drift=Math.sin(ro*.004+i)*10;
      x.beginPath();x.moveTo(sx*.86+W*.07+drift,H*.42);x.lineTo(sx+i*W*.05,H);x.stroke();
    }
  }
  x.restore();
}

function drawSceneSigns(sc,ro){
  // One tiny side sign moving with the road, not fixed like an advert.
  let ci=run?run.L.ci:chapter,spacing=H+420,marker=ro*.66+ci*211+260;
  let wrap=Math.floor(marker/spacing),signY=(marker%spacing)-190;
  if(signY<H*.18||signY>H*.90)return;
  let side=((wrap+ci)%2)?1:-1,sx=sideRailX(signY,side),depth=clamp((signY-H*.18)/(H*.72),0,1),txt=sc.sign[(wrap+ci)%sc.sign.length]||'CAT ZONE';
  x.save();
  x.globalAlpha=.36+depth*.22;
  x.fillStyle='rgba(30,22,14,.46)';rr(sx-2,signY+20,4,36,3);x.fill();
  x.fillStyle=sc.signBg;rr(sx-31,signY,62,24,7);x.fill();
  x.strokeStyle=sc.signStroke;x.lineWidth=1.6;rr(sx-31,signY,62,24,7);x.stroke();
  x.fillStyle=sc.signStroke;x.font='900 8px system-ui';x.textAlign='center';
  x.fillText(txt.split(' ').slice(0,2).join(' '),sx,signY+12);
  x.font='9px system-ui';x.fillText('🐾',sx,signY+22);
  x.restore();
}

function drawMilkCarton(mx,my){
  x.save();x.translate(mx,my);
  // Carton body
  x.fillStyle='#f5f5f0';rr(-18,0,36,50,4);x.fill();
  x.strokeStyle='#ccc';x.lineWidth=1.5;rr(-18,0,36,50,4);x.stroke();
  // Blue stripe
  x.fillStyle='#3fa8ff';x.fillRect(-18,12,36,14);
  // MILK text
  x.fillStyle='white';x.font='bold 9px system-ui';x.textAlign='center';x.fillText('MILK',0,22);
  // Roof triangle
  x.fillStyle='#e8e8e0';x.beginPath();x.moveTo(-18,0);x.lineTo(0,-14);x.lineTo(18,0);x.closePath();x.fill();x.stroke();
  // Spill on floor
  x.fillStyle='rgba(255,255,255,.24)';x.beginPath();x.ellipse(10,50,24,6,0.3,0,Math.PI*2);x.fill();
  x.restore();
}

function drawCatBowl(bx,by){
  x.save();x.translate(bx,by);

  x.fillStyle='#d94a20';x.beginPath();x.ellipse(0,10,28,12,0,0,Math.PI*2);x.fill();
  x.fillStyle='#c23a12';x.beginPath();x.arc(0,0,28,0,Math.PI);x.closePath();x.fill();
  x.strokeStyle='#8a1a04';x.lineWidth=2;x.beginPath();x.arc(0,0,28,0,Math.PI);x.stroke();

function drawYarnBall(yx,yy,r,col){
  x.save();x.translate(yx,yy);
  x.fillStyle=col;x.beginPath();x.arc(0,0,r,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(255,255,255,.5)';x.lineWidth=1.5;
  for(let i=0;i<6;i++){x.save();x.rotate(i*Math.PI/3);x.beginPath();x.moveTo(-r,0);x.bezierCurveTo(-r*.5,-r*.5,r*.5,r*.5,r,0);x.stroke();x.restore()}
  x.restore();
}

function drawCardboardBox(bx,by){

function drawFishBone(fx,fy,size){
  x.save();x.translate(fx,fy);
  x.strokeStyle='rgba(180,120,60,.6)';x.lineWidth=2;
  x.beginPath();x.moveTo(-size,0);x.lineTo(size,0);x.stroke();
  for(let i=-1;i<=1;i+=.5){x.beginPath();x.moveTo(i*size*.7,-size*.5);x.lineTo(i*size*.7,size*.5);x.stroke()}
  x.restore();
}

function drawPawPrint(px,py,size){
  x.beginPath();x.ellipse(px,py+size*.4,size*.5,size*.35,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(px-size*.55,py-size*.1,size*.28,size*.22,-.4,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(px+size*.55,py-size*.1,size*.28,size*.22,.4,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(px,py-size*.4,size*.25,size*.20,0,0,Math.PI*2);x.fill();
}

// ─── DRAW CAT (hero) ─────────────────────────────────────────────────────────
function drawCat(cx,cy,bodyCol,headCol,accType,isLeader,size){
  let s=size||1;
  x.save();x.translate(cx,cy);x.scale(s,s);
  // Body
  x.fillStyle=bodyCol;rr(-7,-2,14,13,5);x.fill();
  // Tail
  x.strokeStyle=bodyCol;x.lineWidth=3.5;x.lineCap='round';
  x.beginPath();x.moveTo(7,8);x.bezierCurveTo(18,4,20,-8,14,-12);x.stroke();
  // Head
  x.fillStyle=headCol;x.beginPath();x.arc(0,-13,9,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(0,0,0,.15)';x.lineWidth=1;x.stroke();
  // Ears
  x.fillStyle=headCol;
  x.beginPath();x.moveTo(-7,-19);x.lineTo(-12,-27);x.lineTo(-2,-20);x.closePath();x.fill();
  x.beginPath();x.moveTo(7,-19);x.lineTo(12,-27);x.lineTo(2,-20);x.closePath();x.fill();
  // Inner ear pink
  x.fillStyle='rgba(255,160,180,.7)';
  x.beginPath();x.moveTo(-7,-20);x.lineTo(-10,-25);x.lineTo(-4,-20);x.closePath();x.fill();
  x.beginPath();x.moveTo(7,-20);x.lineTo(10,-25);x.lineTo(4,-20);x.closePath();x.fill();
  // Eyes
  x.fillStyle='#fff';
  x.beginPath();x.ellipse(-3.5,-14,2.8,2.8,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(3.5,-14,2.8,2.8,0,0,Math.PI*2);x.fill();
  // Pupils
  x.fillStyle='#1a0a00';
  x.beginPath();x.ellipse(-3.5,-14,1.5,1.8,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(3.5,-14,1.5,1.8,0,0,Math.PI*2);x.fill();
  // Eye shine
  x.fillStyle='rgba(255,255,255,.9)';
  x.beginPath();x.arc(-2.5,-13.5,.9,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(4.5,-13.5,.9,0,Math.PI*2);x.fill();
  // Nose
  x.fillStyle='#e87090';x.beginPath();x.ellipse(0,-10.5,1.6,1.2,0,0,Math.PI*2);x.fill();
  // Mouth
  x.strokeStyle='rgba(0,0,0,.5)';x.lineWidth=1;x.beginPath();x.moveTo(0,-9.5);x.lineTo(-2,-7.5);x.moveTo(0,-9.5);x.lineTo(2,-7.5);x.stroke();
  // Whiskers
  x.strokeStyle='rgba(255,255,255,.85)';x.lineWidth=.9;
  x.beginPath();x.moveTo(-2,-10);x.lineTo(-11,-8.5);x.stroke();
  x.beginPath();x.moveTo(-2,-10);x.lineTo(-11,-11.5);x.stroke();
  x.beginPath();x.moveTo(2,-10);x.lineTo(11,-8.5);x.stroke();
  x.beginPath();x.moveTo(2,-10);x.lineTo(11,-11.5);x.stroke();
  // Paws
  x.fillStyle=bodyCol;
  x.beginPath();x.ellipse(-5,11,3,2,-.2,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(5,11,3,2,.2,0,Math.PI*2);x.fill();
  // Accessory
  if(accType==='crown'||isLeader){
    x.fillStyle='#ffd700';
    x.beginPath();x.moveTo(-7,-22);x.lineTo(-5,-30);x.lineTo(-1,-24);x.lineTo(0,-32);x.lineTo(1,-24);x.lineTo(5,-30);x.lineTo(7,-22);x.closePath();x.fill();
    x.strokeStyle='#c8a000';x.lineWidth=1;x.stroke();
    x.fillStyle='#ff4444';x.beginPath();x.arc(0,-31,1.8,0,Math.PI*2);x.fill();
  } else if(accType==='bandana'){
    x.fillStyle='#ff4444';rr(-6,-5,12,4,2);x.fill();
    x.strokeStyle='#cc0000';x.lineWidth=1;rr(-6,-5,12,4,2);x.stroke();
  } else if(accType==='cape'){
    x.fillStyle='#6600cc';x.beginPath();x.moveTo(-7,0);x.lineTo(-10,12);x.lineTo(10,12);x.lineTo(7,0);x.fill();
    x.fillStyle='#ff0';x.beginPath();x.arc(0,2,1.5,0,Math.PI*2);x.fill();
  } else if(accType==='helm'){
    x.fillStyle='#888ea8';rr(-9,-24,18,12,6);x.fill();
    x.strokeStyle='#6a7080';x.lineWidth=1.5;rr(-9,-24,18,12,6);x.stroke();
  }
  x.restore();
}

// ─── DRAW SQUAD ──────────────────────────────────────────────────────────────
function drawSquad(){
  let p=run.player,sk=skins[shop.skin]||skins.blue;
  let n=Math.min(p.squad,28),cols=Math.min(7,n);
  for(let i=n-1;i>=0;i--){
    let row=(i/cols)|0,col=i%cols;
    let cx=p.x+(col-(cols-1)/2)*14,cy=p.y+row*13;
    let isLead=i===0;
    drawCat(cx,cy,sk.body,sk.head,isLead?(sk.acc||'crown'):sk.acc,isLead,.9);
  }
  if(p.squad>n){
    x.fillStyle='rgba(50,20,5,.65)';rr(p.x+38,p.y-46,65,26,13);x.fill();
    x.fillStyle='#ffe97a';x.font='900 13px system-ui';x.textAlign='center';
    x.fillText('+'+(p.squad-n),p.x+70,p.y-29);
  }
}

function mobName(k){return{kingChihuahua:'KING CHIHUAHUA',bulldogChef:'BULLDOG CHEF',dobermanRanger:'DOBERMAN',raccoonKing:'RACCOON KING',ratEmperor:'RAT EMPEROR',alphaPitbull:'PITBULL',mailman:'MAILMAN',vacuum9000:'VACUUM 9000',royalPoodle:'ROYAL POODLE',dogEmperorRex:'DOG EMPEROR',cyberHound:'CYBER HOUND',cerberus:'CERBERUS',krakenCollar:'KRAKEN',crowBaron:'CROW BARON',omegaDogGate:'OMEGA DOG',chihuahua:'CHIHUAHUA',rat:'RAT',pigeon:'PIGEON',puppy:'PUPPY',mopDog:'MOP DOG',poodle:'POODLE',bulldog:'BULLDOG',mouse:'MOUSE',squirrel:'SQUIRREL',doberman:'DOBERMAN',crow:'CROW',gnome:'GNOME',raccoon:'RACCOON',trashRat:'TRASH RAT',opossum:'OPOSSUM',sewerDog:'SEWER DOG',robotVacuum:'VACUUM',drone:'DRONE',rottweiler:'ROTTWEILER',dogCatcher:'DOG CATCHER',dogTrainer:'TRAINER'}[k]||String(k||'DOG').toUpperCase()}

function drawDogFace(r,col,kind){
  let hitFlash=false;
  // Body
  x.fillStyle=col;
  if(kind==='chihuahua'||kind==='puppy'){
    x.beginPath();x.ellipse(0,0,r*.8,r,0,0,Math.PI*2);x.fill();
  } else if(kind==='bulldog'||kind==='bulldogChef'||kind==='kingChihuahua'){
    x.beginPath();x.ellipse(0,0,r*1.1,r*.9,0,0,Math.PI*2);x.fill();
  } else {
    x.beginPath();x.ellipse(0,0,r,r,0,0,Math.PI*2);x.fill();
  }
  x.strokeStyle='rgba(40,10,0,.4)';x.lineWidth=1.5;x.stroke();
  // Ears by kind
  if(kind==='chihuahua'||kind==='kingChihuahua'){
    // Big pointy ears
    x.fillStyle=col;
    x.beginPath();x.moveTo(-r*.6,-r*.4);x.lineTo(-r*1.3,-r*1.1);x.lineTo(-r*.1,-r*.5);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.6,-r*.4);x.lineTo(r*1.3,-r*1.1);x.lineTo(r*.1,-r*.5);x.closePath();x.fill();
    // Inner
    x.fillStyle='rgba(255,180,180,.6)';
    x.beginPath();x.moveTo(-r*.6,-r*.45);x.lineTo(-r*1.1,-r*1.0);x.lineTo(-r*.2,-r*.55);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.6,-r*.45);x.lineTo(r*1.1,-r*1.0);x.lineTo(r*.2,-r*.55);x.closePath();x.fill();
  } else if(kind==='poodle'||kind==='royalPoodle'){
    // Poodle pom-pom ears
    x.fillStyle='#e87ad8';
    x.beginPath();x.arc(-r*.7,-r*.3,r*.45,0,Math.PI*2);x.fill();
    x.beginPath();x.arc(r*.7,-r*.3,r*.45,0,Math.PI*2);x.fill();
    x.strokeStyle='#c050b0';x.lineWidth=1.5;
    x.beginPath();x.arc(-r*.7,-r*.3,r*.45,0,Math.PI*2);x.stroke();
    x.beginPath();x.arc(r*.7,-r*.3,r*.45,0,Math.PI*2);x.stroke();
  } else if(kind==='bulldog'||kind==='bulldogChef'||kind==='alphaPitbull'){
    // Floppy ears
    x.fillStyle=kind==='alphaPitbull'?'#8a4a2a':'#c08050';
    x.beginPath();x.moveTo(-r*.7,-r*.2);x.bezierCurveTo(-r*1.2,-r*.1,-r*1.1,r*.5,-r*.7,r*.3);x.lineTo(-r*.4,r*.1);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.7,-r*.2);x.bezierCurveTo(r*1.2,-r*.1,r*1.1,r*.5,r*.7,r*.3);x.lineTo(r*.4,r*.1);x.closePath();x.fill();
  } else if(kind==='doberman'||kind==='dobermanRanger'||kind==='dogEmperorRex'){
    // Pointy doberman ears
    x.fillStyle=kind==='dogEmperorRex'?'#5a1a00':'#3a1800';
    x.beginPath();x.moveTo(-r*.5,-r*.5);x.lineTo(-r*.8,-r*1.2);x.lineTo(-r*.1,-r*.6);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.5,-r*.5);x.lineTo(r*.8,-r*1.2);x.lineTo(r*.1,-r*.6);x.closePath();x.fill();
  } else {
    // Default floppy
    x.fillStyle=col;
    x.beginPath();x.moveTo(-r*.6,-r*.3);x.bezierCurveTo(-r*1.0,0,-r*.9,r*.4,-r*.5,r*.2);x.lineTo(-r*.3,0);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.6,-r*.3);x.bezierCurveTo(r*1.0,0,r*.9,r*.4,r*.5,r*.2);x.lineTo(r*.3,0);x.closePath();x.fill();
  }
  // Eyes
  x.fillStyle='#fff';
  x.beginPath();x.ellipse(-r*.32,-r*.15,r*.18,r*.18,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(r*.32,-r*.15,r*.18,r*.18,0,0,Math.PI*2);x.fill();
  // Pupils
  x.fillStyle=kind==='doberman'||kind==='dogEmperorRex'?'#ff2200':'#1a0800';
  x.beginPath();x.ellipse(-r*.32,-r*.15,r*.09,r*.11,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(r*.32,-r*.15,r*.09,r*.11,0,0,Math.PI*2);x.fill();
  // Shine
  x.fillStyle='rgba(255,255,255,.9)';
  x.beginPath();x.arc(-r*.26,-r*.19,r*.05,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(r*.38,-r*.19,r*.05,0,Math.PI*2);x.fill();
  // Nose/snout
  x.fillStyle=kind==='bulldog'||kind==='bulldogChef'?'#d0a060':'#a06030';
  x.beginPath();x.ellipse(0,r*.15,r*.28,r*.22,0,0,Math.PI*2);x.fill();
  x.fillStyle='#1a0800';
  x.beginPath();x.ellipse(-r*.10,r*.13,r*.07,r*.07,0,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(r*.10,r*.13,r*.07,r*.07,0,0,Math.PI*2);x.fill();
  // Mouth/jowls for bulldog
  if(kind==='bulldog'||kind==='bulldogChef'){
    x.fillStyle='rgba(200,130,80,.5)';
    x.beginPath();x.ellipse(-r*.22,r*.35,r*.22,r*.14,-.2,0,Math.PI*2);x.fill();
    x.beginPath();x.ellipse(r*.22,r*.35,r*.22,r*.14,.2,0,Math.PI*2);x.fill();
    // Tooth
    x.fillStyle='#fff';
    x.beginPath();x.moveTo(-r*.12,r*.32);x.lineTo(-r*.07,r*.46);x.lineTo(-r*.02,r*.32);x.closePath();x.fill();
    x.beginPath();x.moveTo(r*.02,r*.32);x.lineTo(r*.07,r*.46);x.lineTo(r*.12,r*.32);x.closePath();x.fill();
  } else {
    x.strokeStyle='rgba(0,0,0,.4)';x.lineWidth=r*.06;
    x.beginPath();x.moveTo(0,r*.25);x.lineTo(-r*.18,r*.38);x.moveTo(0,r*.25);x.lineTo(r*.18,r*.38);x.stroke();
  }
}

function drawRaccoon(r){
  x.fillStyle='#7a7a8a';x.beginPath();x.ellipse(0,0,r,r,0,0,Math.PI*2);x.fill();
  x.strokeStyle='#404048';x.lineWidth=1.5;x.stroke();
  // Mask
  x.fillStyle='#222228';
  x.beginPath();x.ellipse(-r*.28,-r*.08,r*.25,r*.18,-.15,0,Math.PI*2);x.fill();
  x.beginPath();x.ellipse(r*.28,-r*.08,r*.25,r*.18,.15,0,Math.PI*2);x.fill();
  // Eyes inside mask
  x.fillStyle='#fff';
  x.beginPath();x.arc(-r*.28,-r*.08,r*.13,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(r*.28,-r*.08,r*.13,0,Math.PI*2);x.fill();
  x.fillStyle='#1a0800';
  x.beginPath();x.arc(-r*.28,-r*.08,r*.07,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(r*.28,-r*.08,r*.07,0,Math.PI*2);x.fill();
  // Ears
  x.fillStyle='#7a7a8a';
  x.beginPath();x.arc(-r*.65,-r*.75,r*.28,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(r*.65,-r*.75,r*.28,0,Math.PI*2);x.fill();
  // Snout
  x.fillStyle='#c0b090';x.beginPath();x.ellipse(0,r*.2,r*.22,r*.16,0,0,Math.PI*2);x.fill();
  x.fillStyle='#1a0800';x.beginPath();x.arc(0,r*.16,r*.06,0,Math.PI*2);x.fill();
}

function drawRat(r){
  x.fillStyle='#7a6a6a';x.beginPath();x.ellipse(0,0,r*.9,r,0,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(0,0,0,.35)';x.lineWidth=1.5;x.stroke();

  x.fillStyle='#9a8080';x.beginPath();x.ellipse(r*.5,r*.1,r*.55,r*.25,0,0,Math.PI*2);x.fill();
  // Nose
  x.fillStyle='#ff80a0';x.beginPath();x.arc(r*1.0,r*.08,r*.1,0,Math.PI*2);x.fill();
  // Small ears
  x.fillStyle='#ff9aaa';
  x.beginPath();x.arc(-r*.3,-r*.8,r*.28,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(r*.3,-r*.8,r*.28,0,Math.PI*2);x.fill();
  x.strokeStyle='rgba(0,0,0,.3)';x.lineWidth=1;
  x.beginPath();x.arc(-r*.3,-r*.8,r*.28,0,Math.PI*2);x.stroke();
  x.beginPath();x.arc(r*.3,-r*.8,r*.28,0,Math.PI*2);x.stroke();

function drawPigeon(r){

  x.save();x.rotate(-.3);x.beginPath();x.ellipse(-r*.9,-r*.3,r*.7,r*.28,0,0,Math.PI*2);x.fill();x.restore();

function drawRobotVacuum(r){

  x.fillStyle='#c8c8c8';x.beginPath();x.ellipse(0,0,r*1.1,r*.7,0,0,Math.PI*2);x.fill();
  x.strokeStyle='#888';x.lineWidth=2;x.stroke();

  x.fillStyle='#e0e0e0';x.beginPath();x.ellipse(0,-r*.2,r*.9,r*.5,0,Math.PI,Math.PI*2);x.fill();

  x.fillStyle='#cc1100';x.beginPath();x.arc(0,-r*.1,r*.22,0,Math.PI*2);x.fill();
  // Glow
  x.fillStyle='rgba(255,80,40,.35)';x.beginPath();x.arc(0,-r*.1,r*.32,0,Math.PI*2);x.fill();
  // Pupil shine
  x.fillStyle='rgba(255,255,255,.7)';x.beginPath();x.arc(-r*.07,-r*.17,r*.07,0,Math.PI*2);x.fill();

}

function drawMob(m){
  x.save();x.translate(m.x+Math.sin(m.wob)*3,m.y);
  if(m.hit>0)x.translate(rnd(-2,2),rnd(-2,2));
  let r=m.r;
  let kind=m.kind;
  let isDog=['chihuahua','puppy','mopDog','poodle','bulldog','doberman','sewerDog','rottweiler','dogTrainer','kingChihuahua','bulldogChef','dobermanRanger','alphaPitbull','royalPoodle','dogEmperorRex','cyberHound','cerberus'].includes(kind);
  let isRaccoon=['raccoon','raccoonKing','opossum'].includes(kind);
  let isRat=['rat','mouse','trashRat','ratEmperor','squirrel'].includes(kind);
  let isBird=['pigeon','crow','crowBaron'].includes(kind);
  let isRobot=['robotVacuum','drone','vacuum9000','dogCatcher','omegaDogGate'].includes(kind);
  // Pick body color by kind
  let col=kind==='chihuahua'||kind==='kingChihuahua'?'#d4a868':
          kind==='bulldog'||kind==='bulldogChef'?'#c07850':
          kind==='poodle'||kind==='royalPoodle'?'#f0a0e8':
          kind==='doberman'||kind==='dobermanRanger'?'#3a2010':
          kind==='dogEmperorRex'?'#602010':
          kind==='alphaPitbull'?'#a06040':
          kind==='cerberus'?'#2a1408':
          kind==='cyberHound'?'#405080':
          kind==='rottweiler'?'#2a1808':
          kind==='sewerDog'?'#6a7040':
          isDog?'#b07848':
          isRaccoon?'#7a7a8a':
          isRat?'#7a6a6a':
          isBird?'#8898a8':
          isRobot?'#c8c8c8':'#7a7a8a';
  if(isRobot){drawRobotVacuum(r)}
  else if(isBird){drawPigeon(r)}
  else if(isRaccoon){drawRaccoon(r)}
  else if(isRat){drawRat(r)}
  else{drawDogFace(r,col,kind)}
  // Boss accessories
  if(m.boss){
    if(kind==='kingChihuahua'||kind==='dogEmperorRex'||kind==='ratEmperor'||kind==='royalPoodle'||kind==='cerberus'){
      // Crown
      x.fillStyle='#ffd700';
      x.beginPath();x.moveTo(-r*.6,-r-4);x.lineTo(-r*.4,-r-20);x.lineTo(-r*.1,-r-10);x.lineTo(0,-r-24);x.lineTo(r*.1,-r-10);x.lineTo(r*.4,-r-20);x.lineTo(r*.6,-r-4);x.closePath();x.fill();
      x.strokeStyle='#c8a000';x.lineWidth=1.5;x.stroke();
      x.fillStyle='#ff2244';x.beginPath();x.arc(0,-r-23,3,0,Math.PI*2);x.fill();
    }
    if(kind==='cerberus'){
      // Extra 2 heads hinted
      x.fillStyle='rgba(42,20,8,.7)';
      x.beginPath();x.arc(-r*1.3,-r*.3,r*.5,0,Math.PI*2);x.fill();
      x.beginPath();x.arc(r*1.3,-r*.3,r*.5,0,Math.PI*2);x.fill();
      x.fillStyle='#fff';x.beginPath();x.arc(-r*1.2,-r*.38,r*.14,0,Math.PI*2);x.fill();x.beginPath();x.arc(r*1.4,-r*.38,r*.14,0,Math.PI*2);x.fill();
      x.fillStyle='#ff2200';x.beginPath();x.arc(-r*1.2,-r*.38,r*.07,0,Math.PI*2);x.fill();x.beginPath();x.arc(r*1.4,-r*.38,r*.07,0,Math.PI*2);x.fill();
    }
    if(kind==='mailman'){
      // Mailman hat
      x.fillStyle='#2244cc';rr(-r*.7,-r-16,r*1.4,12,4);x.fill();
      x.fillStyle='#1a3399';rr(-r*.9,-r-6,r*1.8,6,3);x.fill();
      x.fillStyle='#ffff00';x.font='bold 8px system-ui';x.textAlign='center';x.fillText('MAIL',0,-r-7);
    }
    if(kind==='vacuum9000'){
      // Upgrade - glowing red eye
      x.fillStyle='rgba(255,50,0,.5)';x.beginPath();x.arc(0,0,r*1.3,0,Math.PI*2);x.fill();
      x.font='bold 9px system-ui';x.textAlign='center';x.fillStyle='#ff8888';x.fillText('9000',0,r+14);
    }
    // Boss name label
    x.fillStyle='rgba(50,10,0,.7)';rr(-r-10,-r-46,r*2+20,18,8);x.fill();
    x.fillStyle='#ffe97a';x.font='bold 11px system-ui';x.textAlign='center';
    x.strokeStyle='rgba(0,0,0,.8)';x.lineWidth=3;
    x.strokeText(mobName(kind),0,-r-32);x.fillText(mobName(kind),0,-r-32);
  }
  // HP bar
  x.fillStyle='rgba(0,0,0,.55)';rr(-r,-r-16,r*2,6,3);x.fill();
  x.fillStyle=m.hp/m.max<.35?'#ff315d':'#75ff6f';rr(-r,-r-16,r*2*clamp(m.hp/m.max,0,1),6,3);x.fill();
  x.restore();
}

// ─── DRAW GATE ───────────────────────────────────────────────────────────────
function drawGate(g){
  let positive=(g.type==='add'||g.type==='minus')?Math.round(g.val)>=0:['add','mult'].includes(g.type);
  let bad=g.type==='slow'||g.type==='weak'||g.type==='half';
  if(bad)positive=false;
  x.save();x.translate(g.x,g.y);
  let sc=1+(g.pulse||0)*2;x.scale(sc,sc);
  // Gate card background
  let bg=positive?
    x.createLinearGradient(-g.w/2,-g.h/2,g.w/2,g.h/2):
    x.createLinearGradient(-g.w/2,-g.h/2,g.w/2,g.h/2);
  if(positive){bg.addColorStop(0,'#c0f0ff');bg.addColorStop(.5,'#a0d8ff');bg.addColorStop(1,'#80b8ff')}
  else{bg.addColorStop(0,'#ff9090');bg.addColorStop(.5,'#ff6060');bg.addColorStop(1,'#cc3030')}
  x.fillStyle=bg;rr(-g.w/2,-g.h/2,g.w,g.h,18);x.fill();
  // Border glow
  x.strokeStyle=positive?'#4ae0ff':'#ff2244';
  x.lineWidth=positive?4:4;
  rr(-g.w/2,-g.h/2,g.w,g.h,18);x.stroke();
  // Inner glow ring
  x.strokeStyle=positive?'rgba(180,250,255,.5)':'rgba(255,180,180,.5)';
  x.lineWidth=2;
  rr(-g.w/2+5,-g.h/2+5,g.w-10,g.h-10,13);x.stroke();
  // Main label
  let lab=(g.type==='add'||g.type==='minus')?(Math.round(g.val)>=0?'+'+Math.round(g.val):String(Math.round(g.val))):
           g.type==='half'?'÷2':g.type==='slow'?'NAP':g.type==='weak'?'CLAW':'x'+g.val.toFixed(1);
  x.textAlign='center';
  x.font='900 '+(lab.length>5?20:28)+'px system-ui';
  x.strokeStyle='rgba(0,0,0,.5)';x.lineWidth=5;x.strokeText(lab,0,-10);
  x.fillStyle=positive?'#003366':'#ffffff';x.fillText(lab,0,-10);
  // Sub label
  let sub=positive?(g.type==='mult'?'x CATS':(g.type==='add'||g.type==='minus')?'+CATS':'ADOPT'):
          g.type==='half'?'÷ CATS':g.type==='slow'?'x0.65 FIRE':'WEAK';
  x.font='bold 10px system-ui';
  x.fillStyle=positive?'rgba(0,50,100,.8)':'rgba(255,230,230,.9)';
  x.strokeStyle='rgba(0,0,0,.4)';x.lineWidth=3;
  x.strokeText(sub,0,12);x.fillText(sub,0,12);
  // Fish icon for add gates
  if(positive&&(g.type==='add'||g.type==='mult')){
    x.font='16px system-ui';x.fillText('🐟',0,35);
  } else if(!positive){
    x.font='16px system-ui';x.fillText('🐕',0,35);
  }
  x.restore();
}

// ─── DRAW CRYSTAL/TREASURE ───────────────────────────────────────────────────
function drawCrystal(o){
  x.save();x.translate(o.x,o.y);
  let col=o.kind==='coin'?'#ffe15e':crystalColor(o.power||'pierce');
  // Glow
  x.fillStyle=col.replace(')',', .18)').replace('rgb','rgba').replace('#','rgba(').replace(/rgba\(([0-9a-f]{6}), .18\)/i,()=>{
    let h=col.slice(1);
    let r=parseInt(h.slice(0,2),16),g2=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    return `rgba(${r},${g2},${b},0.22)`;
  });
  x.beginPath();x.arc(0,0,o.rad+10,0,Math.PI*2);x.fill();
  // Card body
  if(o.kind==='coin'){
    // Fish shaped
    x.fillStyle='#ffe87a';rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.5);x.fill();
    x.strokeStyle='#c8a000';x.lineWidth=3;rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.5);x.stroke();
    x.font='22px system-ui';x.textAlign='center';x.fillText('🐟',0,8);
  } else {
    x.fillStyle='rgba(30,20,40,.8)';rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.4);x.fill();
    x.strokeStyle=col;x.lineWidth=3;rr(-o.rad,-o.rad,o.rad*2,o.rad*2,o.rad*.4);x.stroke();
    // Crystal gem
    x.fillStyle=col;
    x.beginPath();x.moveTo(0,-o.rad*.6);x.lineTo(o.rad*.5,0);x.lineTo(0,o.rad*.6);x.lineTo(-o.rad*.5,0);x.closePath();x.fill();
    x.fillStyle='rgba(255,255,255,.4)';
    x.beginPath();x.moveTo(0,-o.rad*.6);x.lineTo(o.rad*.5,0);x.lineTo(0,0);x.closePath();x.fill();
  }
  // Label
  let cl=o.kind==='coin'?'FISH':crystalLabel(o.power||'pierce');
  x.font='bold 9px system-ui';x.textAlign='center';
  x.strokeStyle='rgba(0,0,0,.8)';x.lineWidth=3;x.strokeText(cl,0,o.rad+3);
  x.fillStyle='#fff';x.fillText(cl,0,o.rad+3);
  // HP bar
  x.fillStyle='rgba(0,0,0,.5)';rr(-o.rad,-o.rad-14,o.rad*2,5,3);x.fill();
  x.fillStyle='#72ff7a';rr(-o.rad,-o.rad-14,o.rad*2*clamp(o.hp/o.max,0,1),5,3);x.fill();
  x.restore();
}

// ─── DRAW BULLETS ────────────────────────────────────────────────────────────
function drawBullet(b){
  let bc=(bullets[shop.bullet]||bullets.yellow).col;
  let col=b.pierce?'#c783ff':bc;
  x.fillStyle=col;
  // Yarn ball bullet
  if(shop.bullet==='yellow'){
    x.beginPath();x.arc(b.x,b.y,(b.pierce?4:3)*(b.size||1),0,Math.PI*2);x.fill();
    x.strokeStyle='rgba(255,255,100,.5)';x.lineWidth=1;
    x.beginPath();x.arc(b.x,b.y,(b.pierce?4:3)*(b.size||1),0,Math.PI*2);x.stroke();
  } else {
    x.beginPath();x.ellipse(b.x,b.y,(b.pierce?4:3)*(b.size||1),(b.pierce?12:9)*(b.size||1),0,0,Math.PI*2);x.fill();
  }
}

// ─── MAIN DRAW ───────────────────────────────────────────────────────────────
function draw(){
  x.setTransform(DPR,0,0,DPR,0,0);
  drawBg();
  if(run){
    x.save();
    if(shake>0){x.translate(rnd(-shake*16,shake*16),rnd(-shake*16,shake*16));shake*=.88}
    run.gates.forEach(drawGate);
    run.crys.forEach(drawCrystal);
    run.mobs.forEach(drawMob);
    run.bul.forEach(drawBullet);
    drawSquad();
    run.fx.forEach(f=>{x.globalAlpha=clamp(f.t*2,0,1);x.fillStyle=f.c;x.beginPath();x.arc(f.x,f.y,f.r,0,Math.PI*2);x.fill();x.globalAlpha=1});
    run.texts.forEach(t=>{
      x.globalAlpha=clamp(t.t*1.5,0,1);
      x.font='900 20px system-ui';x.textAlign='center';
      x.strokeStyle='rgba(0,0,0,.8)';x.lineWidth=5;x.strokeText(t.s,t.x,t.y);
      x.fillStyle=t.c;x.fillText(t.s,t.x,t.y);
      x.globalAlpha=1;
    });
    x.restore();
  }
  if(msgT>0){msgT-=.016;if(msgT<=0)toast.classList.add('hidden')}
}

function loop(ts){
  let dt=Math.min(.033,(ts-last)/1000||.016);last=ts;
  if(state==='play')update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
c.addEventListener('pointerdown',e=>{if(!run||state!=='play')return;drag=true;startX=e.clientX;startPX=run.player.tx});
c.addEventListener('pointermove',e=>{if(!drag||!run)return;run.player.tx=clamp(startPX+(e.clientX-startX)*1.08,W*.15,W*.85)});
addEventListener('pointerup',()=>drag=false);
addEventListener('pointercancel',()=>drag=false);

htmlHome();
requestAnimationFrame(loop);
})();
</script></body></html>
